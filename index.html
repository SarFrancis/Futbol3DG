      el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{
        const usado=S.partidos.some(x=>x.torneoId===t.id)||S.triangulares.some(x=>x.torneoId===t.id)||S.sanciones.some(x=>x.torneoId===t.id);
        if(usado) return toast('Tiene partidos o sanciones cargados: no se puede eliminar');
        if(confirm('¿Eliminar torneo vacío?')){ S.torneos=S.torneos.filter(x=>x.id!==t.id); marcar(); render(); }
      }}));
    ul.appendChild(r);
  });
  p3.appendChild(ul);
  p3.querySelector('#cNuevoT').onclick=()=> nuevoTorneo(S.torneos.at(-1)?.id);
  m.appendChild(p3);

  const p5=el('div',{className:'panel'});
  p5.innerHTML=`<h2 class="display">Guardado, respaldo y acceso</h2>
    <div class="hint">Los cambios <b>se guardan solos</b> en el servidor unos segundos después de cada edición (mirá el estado en la barra de arriba). Cualquiera con el <b>PIN de admin</b> puede entrar desde su celu y cargar partidos, jugadores o resultados: pasáselo solo a gente de confianza. El PIN se define en Railway con la variable <code>ADMIN_PIN</code> (si no existe, es <code>prudan</code>): cambiarlo ahí desloguea a todos.</div>
    <div class="rowflex" style="margin-bottom:10px">
      <button class="btn" id="dExp">⬇ Exportar respaldo (JSON)</button>
      <button class="btn" id="dImp">⬆ Importar respaldo</button>
      <input type="file" id="dFile" accept=".json" style="display:none">
    </div>`;
  p5.querySelector('#dExp').onclick=descargarData;
  p5.querySelector('#dImp').onclick=()=>$('#dFile').click();
  p5.querySelector('#dFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    f.text().then(t=>{ try{ const d=JSON.parse(t); if(!d.jugadores||!d.partidos) throw 0; S=d; marcar(); render(); toast('Datos importados y guardándose'); }catch(err){ toast('El archivo no es un respaldo válido'); } });
  };
  m.appendChild(p5);
}

/* ---------- Torneos: finalizar, ascensos/descensos, zonas y puntos propios ---------- */
function finalizarTorneo(t){
  const f=prompt('Fecha de finalización (AAAA-MM-DD):', t.fechaFin||hoy());
  if(f==null) return;
  t.cerrado=true;
  if(f.trim()) t.fechaFin=f.trim();
  if(!t.fechaInicio){ const ini=primeraFechaDe(t.id); if(ini) t.fechaInicio=ini; }
  marcar(); render(); toast('Torneo finalizado');
  if(confirm('¿Crear el próximo torneo ahora? Bajan los últimos 4 de la A y suben los primeros 4 de la B (después podés retocarlo a mano en "Zonas A/B").')) nuevoTorneo(t.id);
}
function nuevoTorneo(prevId){
  const n=prompt('Nombre del nuevo torneo (ej: Apertura 2026)'); if(!n||!n.trim()) return;
  const t={id:uid('t'),nombre:n.trim(),fechaInicio:hoy()};
  const prev=prevId?torneo(prevId):null;
  if(prev?.zonaCorte) t.zonaCorte=prev.zonaCorte;
  const z=prevId? computarZonas(prevId) : null;
  if(z) t.zonas=z;
  S.torneos.push(t); torneoFiltro=t.id; ordenColA=ordenColB=null;
  marcar(); render();
  toast(z?'Torneo creado con ascensos y descensos aplicados':'Torneo creado');
}
function computarZonas(prevId){
  const jugado=S.partidos.some(x=>x.torneoId===prevId)||S.triangulares.some(x=>x.torneoId===prevId);
  if(!jugado) return null;
  const {primera,b}=zonasSplitFor(prevId);
  const bajan   = primera.length>4 ? primera.slice(-4)  : [];
  const quedanA = primera.length>4 ? primera.slice(0,-4): [...primera];
  const suben   = b.slice(0,4);
  const quedanB = b.slice(4);
  return { primera:[...quedanA,...suben].map(r=>r.id), b:[...bajan,...quedanB].map(r=>r.id) };
}
function formZonas(t){
  if(!t.zonas || (!(t.zonas.primera||[]).length && !(t.zonas.b||[]).length)){
    const {primera,b}=zonasSplitFor(t.id);
    t.zonas={primera:primera.map(r=>r.id), b:b.map(r=>r.id)};
    marcar();
  }
  t.zonas.primera=t.zonas.primera||[]; t.zonas.b=t.zonas.b||[];
  openModal(`<h3 class="display">Zonas A/B · ${esc(t.nombre)}</h3>
    <div class="hint">Estas zonas quedan <b>fijas</b> para el torneo: la tabla de la Primera A y de la Primera B se arma con esta lista, en este orden. Movés a cualquiera con los botones.</div>
    <div class="grid2">
      <div><b style="color:var(--verde)">Primera A</b><div class="plist" id="zA"></div></div>
      <div><b style="color:var(--azul)">Primera B</b><div class="plist" id="zB"></div></div>
    </div>
    <div id="zRestWrap"></div>
    <div class="modalacts"><button class="btn ghost" id="zAuto">Quitar zonas fijas</button><button class="btn primary" id="zOk">Listo</button></div>`);
  const fila=(id,acciones)=>{ const d=el('label'); d.append(el('span',{textContent:jnom(id)}), el('span',{className:'spacer'}), ...acciones); return d; };
  const draw=()=>{
    const A=$('#zA'), B=$('#zB'); A.innerHTML=''; B.innerHTML='';
    t.zonas.primera.forEach(id=> A.appendChild(fila(id,[el('button',{className:'btn small',type:'button',textContent:'↓ a la B',onclick:()=>{ t.zonas.primera=t.zonas.primera.filter(x=>x!==id); t.zonas.b.push(id); marcar(); draw(); }})])));
    t.zonas.b.forEach(id=> B.appendChild(fila(id,[el('button',{className:'btn small',type:'button',textContent:'↑ a la A',onclick:()=>{ t.zonas.b=t.zonas.b.filter(x=>x!==id); t.zonas.primera.push(id); marcar(); draw(); }})])));
    const asignados=new Set([...t.zonas.primera,...t.zonas.b]);
    const libres=jugadoresActivos().filter(j=>!asignados.has(j.id));
    const w=$('#zRestWrap'); w.innerHTML='';
    if(libres.length){
      w.appendChild(el('div',{className:'hint',style:'margin-top:10px',textContent:'Sin zona asignada (mientras tanto aparecen en la B):'}));
      const lst=el('div',{className:'plist'});
      libres.forEach(j=> lst.appendChild(fila(j.id,[
        el('button',{className:'btn small',type:'button',textContent:'+ A',onclick:()=>{ t.zonas.primera.push(j.id); marcar(); draw(); }}),
        el('button',{className:'btn small',type:'button',textContent:'+ B',onclick:()=>{ t.zonas.b.push(j.id); marcar(); draw(); }})
      ])));
      w.appendChild(lst);
    }
  };
  draw();
  $('#zAuto').onclick=()=>{ delete t.zonas; marcar(); closeModal(); render(); toast('El torneo vuelve al corte automático por posiciones'); };
  $('#zOk').onclick=()=>{ closeModal(); render(); };
}
function formPuntosTorneo(t){
  const P=puntosDe(t.id);
  const campos=[['pj','Partido jugado'],['g','Victoria'],['e','Empate'],['p','Derrota'],['mvp','MVP'],['domador','Domador'],['domado','Domado'],['goleadaFavor','Goleada a favor'],['goleadaContra','Goleada en contra'],['tri1','Triangular 1°'],['tri2','Triangular 2°'],['tri3','Triangular 3°'],['gano4pj','Ganó 4PJ (triangular)']];
  openModal(`<h3 class="display">Puntos · ${esc(t.nombre)}</h3>
    <div class="hint">${t.puntos?'Este torneo usa <b>puntos propios</b>.':'Este torneo usa los puntos por defecto de la liga.'} Cualquier valor que cambies vale <b>solo para este torneo</b>; el resto sigue tomando los valores de la liga.</div>
    <div class="pgrid">${campos.map(([k,l])=>`<div class="field"><label>${l}</label><input type="number" step="0.5" data-tp="${k}" value="${P[k]}"></div>`).join('')}</div>
    <div class="modalacts"><button class="btn ghost" id="tpReset">Usar los de la liga</button><button class="btn primary" id="tpOk">Listo</button></div>`);
  document.querySelectorAll('[data-tp]').forEach(i=> i.onchange=()=>{ t.puntos=t.puntos||{}; t.puntos[i.dataset.tp]=+i.value||0; marcar(); toast('Puntos del torneo actualizados'); });
  $('#tpReset').onclick=()=>{ delete t.puntos; marcar(); closeModal(); render(); toast('El torneo vuelve a usar los puntos de la liga'); };
  $('#tpOk').onclick=()=>{ closeModal(); render(); };
}
function formCampeon(t){
  const jugs = jugadoresActivos();
  const opts = `<option value="">— Sin campeón —</option>` + jugs.map(j=>`<option value="${j.id}" ${t.campeonId===j.id?'selected':''}>${esc(j.nombre)}</option>`).join('');
  openModal(`<h3 class="display">Campeón · ${esc(t.nombre)}</h3>
    <div class="hint">Elegí quién se consagró campeón de este torneo. Va a aparecer con 🏆 junto a su nombre en la tabla de este torneo, y también en "Todos los torneos".</div>
    <div class="field"><label>Campeón</label><select id="fCampeon">${opts}</select></div>
    <div class="modalacts"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="fOk">Guardar</button></div>`);
  $('#fOk').onclick=()=>{
    const v=$('#fCampeon').value;
    if(v) t.campeonId=v; else delete t.campeonId;
    marcar(); closeModal(); render(); toast(v?'Campeón guardado':'Campeón quitado');
  };
}

/* ---------- Guardado en servidor ---------- */
let saveTimer=null, saving=false, pinAdmin=null;
function estadoGuardado(txt,color){ $('#dirty').textContent=txt; $('#dirty').style.color=color||'var(--muted)'; }
function scheduleSave(){
  if(!isAdmin) return;
  estadoGuardado('● Guardando…','#e6a817');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(guardarServidor, 1200);
}
async function guardarServidor(){
  if(saving){ clearTimeout(saveTimer); saveTimer=setTimeout(guardarServidor,800); return; }
  saving=true;
  try{
    const r=await fetch('api/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:pinAdmin, data:S})});
    const j=await r.json().catch(()=>({}));
    if(r.ok && j.ok){ dirty=false; estadoGuardado('✓ Guardado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),'var(--verde)'); }
    else if(r.status===403){ estadoGuardado('⚠ PIN rechazado por el servidor','var(--rojo)'); toast('El servidor rechazó el PIN: volvé a entrar como admin'); }
    else estadoGuardado('⚠ No se pudo guardar (queda en este dispositivo)','var(--rojo)');
  }catch(e){
    estadoGuardado('⚠ Sin conexión: cambios solo en este dispositivo','var(--rojo)');
  }
  saving=false;
}
function descargarData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=el('a',{href:URL.createObjectURL(blob),download:'data.json'}); document.body.appendChild(a); a.click(); a.remove();
  toast('Respaldo descargado');
}

/* ---------- Admin login ---------- */
async function loginAdmin(pin){
  try{
    const r=await fetch('api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    const j=await r.json();
    return j.ok===true;
  }catch(e){
    // sin servidor (vista previa/local): fallback al PIN embebido
    return pin===(S.config.adminPin||'prudan');
  }
}
$('#btnAdmin').onclick=async()=>{
  if(isAdmin){ isAdmin=false; pinAdmin=null; store.del('prudanAdminPin'); if(tab==='config') tab='tabla'; render(); return; }
  const pin=prompt('PIN de administrador:');
  if(pin==null) return;
  if(await loginAdmin(pin)){ isAdmin=true; pinAdmin=pin; store.set('prudanAdminPin',pin); render(); toast('Modo admin activado: los cambios se guardan solos'); }
  else toast('PIN incorrecto');
};
$('#btnDescargar').onclick=descargarData;
$('#btnPublicar').onclick=()=>{ estadoGuardado('● Guardando…','#e6a817'); guardarServidor(); };

/* ---------- BOOT ---------- */
async function boot(){
  let base=null;
  try{ const r=await fetch('data.json',{cache:'no-store'}); if(r.ok) base=await r.json(); }catch(e){}
  if(base){ S=base; }
  else {
    try{ const t=store.get('prudanData'); if(t) S=JSON.parse(t); }catch(e){}
    if(!S) S=SEED;
  }
  if(!S.config.flags) S.config.flags={};
  const savedPin=store.get('prudanAdminPin');
  if(savedPin && await loginAdmin(savedPin)){ isAdmin=true; pinAdmin=savedPin; }
  torneoFiltro = S.torneos.at(-1)?.id || 'ALL';
  $('#hLiga').textContent = (S.config.nombreLiga||'Matheu').replace(/^Copa de la Liga\s*/i,'') || 'Matheu';
  estadoGuardado(base?'✓ Datos del servidor':'⚠ Sin servidor: modo local','var(--muted)');
  render();
}
boot();
</script>
