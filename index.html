<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa de la Liga Prudan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1a12; --panel:#10241a; --panel2:#16332472; --panel3:#1a3a29;
  --line:rgba(233,242,228,.13); --cal:#e9f2e4;
  --text:#edf5ec; --muted:#8fa898; --muted2:#6b8474;
  --amarillo:#f2c13d; --verde:#4cb872; --verde2:#2e7d4f; --rojo:#e05548; --azul:#5aa7d6;
  --radius:12px;
}
*{box-sizing:border-box; margin:0; padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif; font-size:14.5px; line-height:1.5;
  background-image:
    radial-gradient(1100px 500px at 50% -180px, rgba(76,184,114,.10), transparent 60%),
    repeating-linear-gradient(90deg, transparent 0 119px, rgba(233,242,228,.018) 119px 120px);
  min-height:100vh;
}
.display{font-family:'Anton','Arial Narrow',Impact,sans-serif; letter-spacing:.02em; font-weight:400}

/* ===== Header ===== */
header{
  border-bottom:2px solid var(--line); padding:18px 16px 0;
  background:linear-gradient(180deg, rgba(16,36,26,.9), rgba(10,26,18,.4));
  position:sticky; top:0; z-index:40; backdrop-filter:blur(8px);
}
.hrow{max-width:1180px; margin:0 auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.copa{display:flex; align-items:baseline; gap:10px; margin-right:auto}
.copa h1{font-size:clamp(22px,4.5vw,34px); text-transform:uppercase; line-height:1}
.copa h1 .liga{color:var(--amarillo)}
.copa .sub{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.18em}
select,input[type=text],input[type=date],input[type=number],input[type=password],textarea{
  background:#0c1f15; color:var(--text); border:1px solid var(--line); border-radius:8px;
  padding:8px 10px; font:inherit; font-size:14px;
}
select:focus,input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--amarillo); outline-offset:1px}
.tsel{font-weight:600}
.btn{
  background:var(--panel3); color:var(--text); border:1px solid var(--line); border-radius:8px;
  padding:8px 14px; font:inherit; font-weight:600; cursor:pointer; font-size:13.5px;
  display:inline-flex; align-items:center; gap:6px; transition:filter .15s, transform .05s;
}
.btn:hover{filter:brightness(1.18)} .btn:active{transform:translateY(1px)}
.btn.primary{background:var(--amarillo); color:#1d1704; border-color:transparent}
.btn.danger{background:transparent; color:var(--rojo); border-color:rgba(224,85,72,.5)}
.btn.ghost{background:transparent}
.btn.small{padding:4px 9px; font-size:12.5px}
.btn:disabled{opacity:.45; cursor:not-allowed}

/* Tabs */
nav.tabs{max-width:1180px; margin:12px auto 0; display:flex; gap:2px; overflow-x:auto; scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs button{
  background:transparent; border:none; color:var(--muted); font:inherit; font-weight:600; font-size:13.5px;
  padding:10px 13px; cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent;
  text-transform:uppercase; letter-spacing:.05em;
}
nav.tabs button.on{color:var(--cal); border-bottom-color:var(--amarillo)}
nav.tabs button:hover{color:var(--cal)}

main{max-width:1180px; margin:0 auto; padding:18px 14px 90px}

/* Admin bar */
#adminbar{
  display:none; max-width:1180px; margin:12px auto 0; padding:8px 12px; border-radius:10px;
  background:rgba(242,193,61,.08); border:1px dashed rgba(242,193,61,.45);
  font-size:13px; color:var(--amarillo); align-items:center; gap:10px; flex-wrap:wrap;
}
#adminbar.on{display:flex}
#dirty{font-weight:700}

/* Cards / panels */
.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:16px}
.panel h2{font-size:18px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px}
.panel .hint{color:var(--muted); font-size:12.5px; margin-bottom:12px}
.rowflex{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.spacer{flex:1}

/* ===== Tabla ===== */
.tablewrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius); background:var(--panel)}
table.tabla{border-collapse:collapse; width:100%; min-width:980px; font-size:13.5px}
table.tabla th{
  text-align:center; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.08em;
  padding:10px 7px; border-bottom:2px solid var(--line); position:sticky; top:0; background:var(--panel); cursor:pointer; user-select:none;
}
table.tabla th.sorted{color:var(--amarillo)}
table.tabla td{padding:8px 7px; text-align:center; border-bottom:1px solid rgba(233,242,228,.05)}
table.tabla td.rank{font-family:'Anton',Impact,sans-serif; font-size:17px; color:var(--muted); width:44px}
table.tabla td.nombre, table.tabla th.nombre{text-align:left; font-weight:600; white-space:nowrap}
table.tabla td.pts{font-family:'Anton',Impact,sans-serif; font-size:17px; color:var(--amarillo)}
table.tabla td.mmr{font-weight:700; color:var(--azul)}
table.tabla tr:hover td{background:rgba(233,242,228,.03)}
tr.zona-div td{
  border-top:3px dashed rgba(233,242,228,.35); border-bottom:none; padding:5px 10px;
  font-size:10.5px; letter-spacing:.25em; text-transform:uppercase; color:var(--muted); text-align:left; background:transparent!important;
}
.zlabel{display:flex; justify-content:space-between}
td .neg{color:var(--rojo)} td .pos{color:var(--verde)}
.chip-zona{font-size:10px; padding:2px 8px; border-radius:99px; border:1px solid var(--line); color:var(--muted); letter-spacing:.1em}

/* Partido cards */
.pcard{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px}
.pcard .ptop{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; font-size:12.5px; color:var(--muted)}
.pcard .fecha{font-weight:700; color:var(--cal)}
.badge{font-size:11px; padding:2px 8px; border-radius:99px; border:1px solid var(--line); color:var(--muted); white-space:nowrap}
.badge.gol{border-color:rgba(242,193,61,.5); color:var(--amarillo)}
.badge.mvp{border-color:rgba(90,167,214,.55); color:var(--azul)}
.badge.doma{border-color:rgba(76,184,114,.5); color:var(--verde)}
.badge.domado{border-color:rgba(224,85,72,.5); color:var(--rojo)}
.badge.off{opacity:.65}
.equipos{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:start}
.equipos.tri{grid-template-columns:1fr 1fr 1fr}
.eq{border:1px solid var(--line); border-radius:10px; padding:10px}
.eq.win{border-color:rgba(76,184,114,.6); background:rgba(76,184,114,.06)}
.eq .ename{font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:6px; display:flex; justify-content:space-between; gap:6px}
.eq .ename .res-g{color:var(--verde); font-weight:800}
.eq .ename .res-p{color:var(--rojo)} .eq .ename .res-e{color:var(--amarillo)}
.eq ul{list-style:none}
.eq li{padding:2px 0; font-size:13.5px}
.vs{align-self:center; font-family:'Anton',Impact,sans-serif; color:var(--muted2); font-size:15px}
.pacts{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap}
@media(max-width:640px){ .equipos{grid-template-columns:1fr} .vs{display:none} .equipos.tri{grid-template-columns:1fr} }

/* Player chips selector */
.chips{display:flex; flex-wrap:wrap; gap:6px; min-height:36px; border:1px dashed var(--line); border-radius:8px; padding:6px}
.chips .chip{background:var(--panel3); border-radius:99px; padding:3px 10px; font-size:12.5px; display:inline-flex; gap:6px; align-items:center}
.chips .chip b{cursor:pointer; color:var(--rojo)}
.picker{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; max-height:180px; overflow:auto}
.picker button{background:#0c1f15; border:1px solid var(--line); color:var(--text); border-radius:99px; padding:4px 11px; font-size:12.5px; cursor:pointer}
.picker button:hover{border-color:var(--amarillo)}
.picker button:disabled{opacity:.3; cursor:default}

/* Modal */
#overlay{position:fixed; inset:0; background:rgba(4,10,7,.72); display:none; z-index:90; overflow:auto; padding:24px 12px}
#overlay.on{display:block}
#modal{max-width:680px; margin:0 auto; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px}
#modal h3{font-size:19px; text-transform:uppercase; margin-bottom:14px; letter-spacing:.05em}
.field{margin-bottom:13px}
.field label{display:block; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.09em; margin-bottom:5px; font-weight:600}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
@media(max-width:560px){.grid2,.grid3{grid-template-columns:1fr}}
.check{display:flex; gap:8px; align-items:center; font-size:14px; cursor:pointer}
.check input{width:17px;height:17px;accent-color:var(--amarillo)}
.modalacts{display:flex; gap:10px; justify-content:flex-end; margin-top:18px}

/* MMR / charts */
.mmr-table td.spark{width:130px}
svg.chart{width:100%; height:340px; display:block}
.legend{display:flex; gap:10px; flex-wrap:wrap; margin:8px 0}
.legend .lg{display:inline-flex; gap:6px; align-items:center; font-size:12.5px; color:var(--muted); cursor:pointer; border:1px solid var(--line); padding:3px 10px; border-radius:99px}
.legend .lg.on{color:var(--cal); border-color:var(--amarillo)}
.legend .dot{width:10px; height:10px; border-radius:50%}
.delta-pos{color:var(--verde); font-size:12px; font-weight:700}
.delta-neg{color:var(--rojo); font-size:12px; font-weight:700}

/* Sorteo */
.anota{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:6px; margin:10px 0}
.anota label{display:flex; gap:8px; align-items:center; background:#0c1f15; border:1px solid var(--line); border-radius:8px; padding:7px 10px; cursor:pointer; font-size:13px}
.anota label input{accent-color:var(--amarillo)}
.anota .m{margin-left:auto; color:var(--azul); font-weight:700; font-size:12px}
.teams-out{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; margin-top:14px}
.tout{border:1px solid var(--line); border-radius:12px; padding:12px; background:var(--panel2)}
.tout h4{text-transform:uppercase; font-size:13px; letter-spacing:.1em; color:var(--amarillo); margin-bottom:6px; display:flex; justify-content:space-between}
.tout ol{list-style:none}
.tout li{display:flex; justify-content:space-between; padding:3px 0; font-size:13.5px; border-bottom:1px dashed rgba(233,242,228,.07)}
.tout li span:last-child{color:var(--muted); font-size:12px}
.tout .avg{margin-top:8px; font-size:12.5px; color:var(--muted)}
.tout .avg b{color:var(--azul)}

/* Matriz */
.matriz{overflow:auto; border:1px solid var(--line); border-radius:var(--radius)}
.matriz table{border-collapse:collapse; font-size:11.5px}
.matriz th,.matriz td{border:1px solid rgba(233,242,228,.07); padding:4px 6px; text-align:center; min-width:34px}
.matriz th{background:var(--panel); position:sticky; top:0; color:var(--muted); font-size:10px}
.matriz th.row{position:sticky; left:0; text-align:right; z-index:2}
.matriz td.p{background:rgba(76,184,114,.22)} .matriz td.n{background:rgba(224,85,72,.22)}

/* Votación */
.voto-tally{display:flex; flex-direction:column; gap:6px; margin-top:10px}
.vbar{display:grid; grid-template-columns:130px 1fr 34px; gap:10px; align-items:center; font-size:13px}
.vbar .bar{height:14px; background:var(--panel3); border-radius:99px; overflow:hidden}
.vbar .bar i{display:block; height:100%; background:linear-gradient(90deg,var(--verde2),var(--verde)); border-radius:99px}

/* Config */
.pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px}
.pgrid .field{margin:0}
.toast{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--panel3); border:1px solid var(--amarillo); color:var(--cal);
  padding:10px 18px; border-radius:10px; font-weight:600; z-index:200; transition:transform .25s; max-width:92vw;
}
.toast.on{transform:translateX(-50%) translateY(0)}
.muted{color:var(--muted)} .small{font-size:12.5px}
.admin-only{display:none} body.is-admin .admin-only{display:initial}
body.is-admin .admin-only.rowflex{display:flex} body.is-admin .admin-only.panel{display:block}
.empty{padding:30px; text-align:center; color:var(--muted)}
code{background:#0c1f15; padding:1px 6px; border-radius:5px; font-size:12.5px}
@media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
</style>
</head>

<body>

  <div class="hrow">
    <div class="copa">

      <span class="sub">Fútbol entre amigos</span>
    </div>
    <select id="torneoSel" class="tsel" title="Torneo"></select>
    <button class="btn ghost" id="btnAdmin" title="Modo administrador">🔒 <span id="adminLbl">Admin</span></button>
  </div>
  <div id="adminbar">
    <span>🛠️ Modo admin activo</span>
    <span id="dirty" class="muted">Sin cambios</span>
    <span class="spacer"></span>

    <button class="btn small primary" id="btnPublicar">☁ Publicar en GitHub</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main id="main"></main>

<div id="overlay"><div id="modal"></div></div>
<div class="toast" id="toast"></div>

let torneoFiltro = 't_last'; // se ajusta en boot
let cache = null;        // resultados computados

const $ = s => document.querySelector(s);
const el = (t,attrs={},html='') => { const e=document.createElement(t); Object.assign(e,attrs); if(html) e.innerHTML=html; return e; };
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = p => p + Math.random().toString(36).slice(2,9);
const fmt = (n,d=1) => (Math.round(n*10**d)/10**d).toLocaleString('es-AR');
const fFecha = f => { if(!f) return '—'; const [y,m,d]=f.split('-'); return `${d}/${m}/${y}`; };
const hoy = () => new Date().toISOString().slice(0,10);

function jugador(id){ return S.jugadores.find(j=>j.id===id) || {nombre:'¿?'} }
function jnom(id){ return jugador(id).nombre }
function torneo(id){ return S.torneos.find(t=>t.id===id) }
function jugadoresActivos(){ return S.jugadores.filter(j=>j.activo!==false).sort((a,b)=>a.nombre.localeCompare(b.nombre)) }

function marcar(){ dirty=true; S.updatedAt=new Date().toISOString(); cache=null;
  store.set('prudanData', JSON.stringify(S));
  $('#dirty').textContent='● Cambios sin publicar'; $('#dirty').style.color='var(--amarillo)';
}
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('on'),2600); }

/* ---------- eventos ordenados cronológicamente ---------- */
function eventosCrono(){
  const evs=[
    ...S.partidos.map(p=>({...p,_tipo:'partido'})),
    ...S.triangulares.map(t=>({...t,_tipo:'tri'}))
  ];
  evs.sort((a,b)=> (a.fecha||'').localeCompare(b.fecha||'') || (a.id||'').localeCompare(b.id||''));
  return evs;
}

/* ---------- Motor MMR (Elo por equipos) ---------- */
function computeMMR(){
  const K = +S.config.mmr.K || 100, INI = +S.config.mmr.inicial || 1000;
  const r = {}, hist = {};
  S.jugadores.forEach(j=>{ r[j.id]=INI; hist[j.id]=[{fecha:null, r:INI, delta:0, label:'Inicial'}]; });
  const get = id => { if(r[id]==null){ r[id]=INI; hist[id]=[{fecha:null,r:INI,delta:0,label:'Inicial'}]; } return r[id]; };
  const exp = (mio, rival) => 1/(1+Math.pow(10,(rival-mio)/400));

  for(const e of eventosCrono()){
    if(e.cuentaMMR===false) continue;
    if(e._tipo==='partido'){
      if(!e.e1?.length || !e.e2?.length) continue;
      const a1 = e.e1.reduce((s,x)=>s+get(x),0)/e.e1.length;
      const a2 = e.e2.reduce((s,x)=>s+get(x),0)/e.e2.length;
      const s1 = e.res==='E1'?1: e.res==='E2'?0:0.5;
      const deltas={};
      e.e1.forEach(x=> deltas[x]=K*(s1-exp(get(x),a2)));
      e.e2.forEach(x=> deltas[x]=K*((1-s1)-exp(get(x),a1)));
      const label = `${fFecha(e.fecha)} · ${e.res==='E'?'Empate': e.res==='E1'?'Ganó E1':'Ganó E2'}`;
      for(const [x,d] of Object.entries(deltas)){ r[x]+=d; hist[x].push({fecha:e.fecha, r:r[x], delta:d, label}); }
    } else { // triangular: cada equipo vs promedio de los otros dos; S = 1 / 0.5 / 0
      const eqs = e.equipos; if(!eqs || eqs.some(q=>!q.length)) continue;
      const avgs = eqs.map(q=> q.reduce((s,x)=>s+get(x),0)/q.length);
      const Sarr=[0,0,0];
      Sarr[e.posiciones[0]]=1; Sarr[e.posiciones[1]]=0.5; Sarr[e.posiciones[2]]=0;
      const deltas={};
      eqs.forEach((q,i)=>{
        const rival=(avgs[0]+avgs[1]+avgs[2]-avgs[i])/2;
        q.forEach(x=> deltas[x]=K*(Sarr[i]-exp(get(x),rival)));
      });
      for(const [x,d] of Object.entries(deltas)){ r[x]+=d; hist[x].push({fecha:e.fecha, r:r[x], delta:d, label:`${fFecha(e.fecha)} · Triangular`}); }
    }
  }
  return {ratings:r, hist};
}

/* ---------- Motor de estadísticas y puntos por torneo ---------- */
function matchTorneo(tid, evTid){
  if(tid==='ALL') return true;
  if(tid==='AMISTOSO') return evTid==null;
  return evTid===tid;
}
function statsBlank(){ return {pj:0,g:0,e:0,p:0,mvp:0,domador:0,domado:0,gf:0,gc:0,t1:0,t2:0,t3:0,g4:0,sanc:0,triPJ:0}; }
function computeStats(tid){
  const st={};
  const of = id => st[id] || (st[id]=statsBlank());
  for(const m of S.partidos){
    if(!matchTorneo(tid,m.torneoId)) continue;
    const win = m.res==='E1'?m.e1: m.res==='E2'?m.e2:[];
    const lose= m.res==='E1'?m.e2: m.res==='E2'?m.e1:[];
    [...m.e1,...m.e2].forEach(x=>{ of(x).pj++; if(m.res==='E') of(x).e++; });
    win.forEach(x=>{ of(x).g++; if(m.goleada) of(x).gf++; });
    lose.forEach(x=>{ of(x).p++; if(m.goleada) of(x).gc++; });
    if(m.mvpId) of(m.mvpId).mvp++;
    (m.domadores||[]).forEach(x=>of(x).domador++);
    (m.domados||[]).forEach(x=>of(x).domado++);
  }
  for(const t of S.triangulares){
    if(!matchTorneo(tid,t.torneoId)) continue;
    ['t1','t2','t3'].forEach((k,i)=> t.equipos[t.posiciones[i]].forEach(x=>{ of(x)[k]++; of(x).triPJ++; }));
    if(t.mvpId) of(t.mvpId).mvp++;
    (t.gano4||[]).forEach(x=>of(x).g4++);
    (t.domadores||[]).forEach(x=>of(x).domador++);
    (t.domados||[]).forEach(x=>of(x).domado++);
  }
  for(const s of S.sanciones){
    if(!matchTorneo(tid,s.torneoId)) continue;
    of(s.jugadorId).sanc += +s.puntos||0;
  }
  return st;
}
function totalPts(x){
  const P=S.config.puntos;
  return x.pj*P.pj + x.g*P.g + x.e*P.e + x.p*P.p + x.mvp*P.mvp
    + x.domador*P.domador + x.domado*P.domado + x.gf*P.goleadaFavor + x.gc*P.goleadaContra
    + x.t1*P.tri1 + x.t2*P.tri2 + x.t3*P.tri3 + x.g4*P.gano4pj - x.sanc;
}
function getCache(){
  if(!cache){ cache = { mmr: computeMMR() }; }
  return cache;
}
</script>

<script>
/* ================= RENDER ================= */
const TABS = [
  ['tabla','Tabla'], ['partidos','Partidos'], ['tris','Triangulares'], ['votacion','Votación MVP'],
  ['mmr','MMR'], ['sorteo','Armar equipos'], ['matriz','Matriz'], ['sanciones','Sanciones'],
  ['jugadores','Jugadores'], ['config','Configuración']
];
function renderTabs(){
  const n=$('#tabs'); n.innerHTML='';
  TABS.forEach(([id,lbl])=>{
    if(id==='config' && !isAdmin) return;
    const b=el('button',{textContent:lbl,onclick:()=>{tab=id;render()}});
    if(tab===id) b.classList.add('on');
    n.appendChild(b);
  });
}
function renderTorneoSel(){
  const s=$('#torneoSel'); s.innerHTML='';
  S.torneos.forEach(t=> s.appendChild(el('option',{value:t.id,textContent:t.nombre})));
  s.appendChild(el('option',{value:'AMISTOSO',textContent:'Amistosos (solo MMR)'}));
  s.appendChild(el('option',{value:'ALL',textContent:'⚽ Todos los torneos'}));
  if(![...s.options].some(o=>o.value===torneoFiltro)) torneoFiltro = S.torneos.at(-1)?.id || 'ALL';
  s.value=torneoFiltro;
  s.onchange=()=>{ torneoFiltro=s.value; render(); };
}
function render(){
  document.body.classList.toggle('is-admin', isAdmin);
  $('#adminbar').classList.toggle('on', isAdmin);
  $('#adminLbl').textContent = isAdmin ? 'Salir de admin' : 'Admin';
  $('#btnAdmin').firstChild.textContent = isAdmin ? '🔓 ' : '🔒 ';
  renderTabs(); renderTorneoSel();
  const m=$('#main'); m.innerHTML='';
  ({tabla:vTabla, partidos:vPartidos, tris:vTris, votacion:vVotacion, mmr:vMMR,
    sorteo:vSorteo, matriz:vMatriz, sanciones:vSanciones, jugadores:vJugadores, config:vConfig}[tab])(m);
}

/* ---------- TABLA ---------- */
let ordenCol = null;
function vTabla(m){
  const st = computeStats(torneoFiltro);
  const {ratings} = getCache().mmr;
  let rows = Object.entries(st).map(([id,x])=>({id, nombre:jnom(id), ...x, total:totalPts(x), mmr:ratings[id]??S.config.mmr.inicial, ppp: x.pj? totalPts(x)/x.pj : 0}));
  // jugadores activos sin partidos también aparecen (como en el Excel)
  jugadoresActivos().forEach(j=>{ if(!st[j.id]) rows.push({id:j.id,nombre:j.nombre,...statsBlank(),total:0,mmr:ratings[j.id]??S.config.mmr.inicial,ppp:0}); });
  const orden = ordenCol || S.config.ordenTabla || 'mmr';
  const dir = -1;
  rows.sort((a,b)=> dir*((a[orden]??0)-(b[orden]??0)) || b.total-a.total || a.nombre.localeCompare(b.nombre));

  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="rowflex"><h2 class="display">Tabla · ${esc(nombreFiltro())}</h2><span class="spacer"></span>
    <span class="chip-zona">Orden: click en columnas</span></div>
    <div class="hint">Zona <b>Primera</b>: puestos 1–${S.config.zonaCorte} · <b>B Nacional</b>: el resto. ${orden==='mmr'?'Ordenada por MMR (como la tabla publicada).':''}</div>`;
  const wrap = el('div',{className:'tablewrap'});
  const cols = [
    ['total','Pts'],['mmr','MMR'],['pj','PJ'],['g','G'],['e','E'],['p','P'],['mvp','MVP'],
    ['domador','Domador'],['domado','Domado'],['gf','Goleada +'],['gc','Goleada −'],
    ['t1','Tri 1°'],['t2','Tri 2°'],['t3','Tri 3°'],['g4','4PJ'],['sanc','Sanc.'],['ppp','Pts/PJ']
  ];
  let html = `<table class="tabla"><thead><tr><th>#</th><th class="nombre">Jugador</th>` +
    cols.map(([k,l])=>`<th data-k="${k}" class="${orden===k?'sorted':''}">${l}</th>`).join('') + `</tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    if(i===S.config.zonaCorte) html += `<tr class="zona-div"><td colspan="${cols.length+2}"><div class="zlabel"><span>↑ Primera</span><span>B Nacional ↓</span></div></td></tr>`;
    html += `<tr><td class="rank">${i+1}</td><td class="nombre">${esc(r.nombre)}</td>
      <td class="pts">${fmt(r.total)}</td><td class="mmr">${fmt(r.mmr,0)}</td>
      <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td><td>${r.mvp||''}</td>
      <td>${r.domador? `<span class="pos">${r.domador}</span>`:''}</td>
      <td>${r.domado? `<span class="neg">${r.domado}</span>`:''}</td>
      <td>${r.gf||''}</td><td>${r.gc? `<span class="neg">${r.gc}</span>`:''}</td>
      <td>${r.t1||''}</td><td>${r.t2||''}</td><td>${r.t3||''}</td><td>${r.g4||''}</td>
      <td>${r.sanc? `<span class="neg">−${fmt(r.sanc)}</span>`:''}</td><td>${fmt(r.ppp,2)}</td></tr>`;
  });
  wrap.innerHTML = html + '</tbody></table>';
  wrap.querySelectorAll('th[data-k]').forEach(th=> th.onclick=()=>{ ordenCol=th.dataset.k; render(); });
  p.appendChild(wrap); m.appendChild(p);
}
function nombreFiltro(){
  return torneoFiltro==='ALL'?'Todos los torneos': torneoFiltro==='AMISTOSO'?'Amistosos': (torneo(torneoFiltro)?.nombre||'');
}

/* ---------- PARTIDOS ---------- */
function vPartidos(m){
  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="rowflex"><h2 class="display">Partidos · ${esc(nombreFiltro())}</h2><span class="spacer"></span></div>`;
  if(isAdmin) p.querySelector('.rowflex').appendChild(el('button',{className:'btn primary',textContent:'+ Nuevo partido',onclick:()=>formPartido()}));
  m.appendChild(p);
  const list = S.partidos.filter(x=>matchTorneo(torneoFiltro,x.torneoId)).sort((a,b)=> b.fecha.localeCompare(a.fecha));
  if(!list.length){ m.appendChild(el('div',{className:'empty',textContent:'Todavía no hay partidos cargados acá.'})); return; }
  list.forEach((pt,idx)=> m.appendChild(cardPartido(pt, list.length-idx)));
}
function cardPartido(pt, nro){
  const c = el('div',{className:'pcard'});
  const badges = [];
  if(pt.torneoId==null) badges.push(`<span class="badge">Amistoso · solo MMR</span>`);
  if(pt.goleada) badges.push(`<span class="badge gol">Goleada (+5 goles)</span>`);
  if(pt.mvpId) badges.push(`<span class="badge mvp">⭐ MVP: ${esc(jnom(pt.mvpId))}</span>`);
  (pt.domadores||[]).forEach(x=>badges.push(`<span class="badge doma">🐎 Domador: ${esc(jnom(x))}</span>`));
  (pt.domados||[]).forEach(x=>badges.push(`<span class="badge domado">Domado: ${esc(jnom(x))}</span>`));
  if(pt.cuentaMMR===false) badges.push(`<span class="badge off">No afecta MMR</span>`);
  if(pt.votacionAbierta) badges.push(`<span class="badge mvp">🗳️ Votación abierta</span>`);
  const eqHtml = (ids, cls, tag) => `<div class="eq ${cls}"><div class="ename"><span>${tag} · ${ids.length} jug.</span>${cls==='win'?'<span class="res-g">GANÓ</span>': pt.res==='E'?'<span class="res-e">EMPATE</span>':'<span class="res-p"></span>'}</div><ul>${ids.map(x=>`<li>${esc(jnom(x))}</li>`).join('')}</ul></div>`;
  c.innerHTML = `<div class="ptop"><span class="fecha">Partido ${nro} · ${fFecha(pt.fecha)}</span>${badges.join(' ')}</div>
    <div class="equipos">${eqHtml(pt.e1, pt.res==='E1'?'win':'', 'Equipo 1')}<div class="vs">VS</div>${eqHtml(pt.e2, pt.res==='E2'?'win':'', 'Equipo 2')}</div>`;
  if(isAdmin){
    const acts=el('div',{className:'pacts'});
    acts.appendChild(el('button',{className:'btn small',textContent:'✎ Editar',onclick:()=>formPartido(pt)}));
    acts.appendChild(el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{ if(confirm('¿Eliminar este partido? Se recalculan puntos y MMR.')){ S.partidos=S.partidos.filter(x=>x.id!==pt.id); marcar(); render(); }}}));
    c.appendChild(acts);
  }
  return c;
}

/* ---------- TRIANGULARES ---------- */
function vTris(m){
  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="rowflex"><h2 class="display">Triangulares · ${esc(nombreFiltro())}</h2><span class="spacer"></span></div>
  <div class="hint">Tres equipos, todos contra todos. Puntos por posición final (${S.config.puntos.tri1} / ${S.config.puntos.tri2} / ${S.config.puntos.tri3}) + bonus por ganar 4 partidos.</div>`;
  if(isAdmin) p.querySelector('.rowflex').appendChild(el('button',{className:'btn primary',textContent:'+ Nuevo triangular',onclick:()=>formTri()}));
  m.appendChild(p);
  const list = S.triangulares.filter(x=>matchTorneo(torneoFiltro,x.torneoId)).sort((a,b)=> b.fecha.localeCompare(a.fecha));
  if(!list.length){ m.appendChild(el('div',{className:'empty',textContent:'No hay triangulares cargados acá.'})); return; }
  list.forEach(t=>{
    const c=el('div',{className:'pcard'});
    const pos=['🥇 1°','🥈 2°','🥉 3°'];
    const orden=[t.posiciones[0],t.posiciones[1],t.posiciones[2]];
    const badges=[];
    if(t.mvpId) badges.push(`<span class="badge mvp">⭐ MVP: ${esc(jnom(t.mvpId))}</span>`);
    (t.gano4||[]).forEach(x=>badges.push(`<span class="badge gol">🔥 Ganó 4PJ: ${esc(jnom(x))}</span>`));
    (t.domadores||[]).forEach(x=>badges.push(`<span class="badge doma">🐎 Domador: ${esc(jnom(x))}</span>`));
    (t.domados||[]).forEach(x=>badges.push(`<span class="badge domado">Domado: ${esc(jnom(x))}</span>`));
    if(t.cuentaMMR===false) badges.push(`<span class="badge off">No afecta MMR</span>`);
    c.innerHTML = `<div class="ptop"><span class="fecha">Triangular · ${fFecha(t.fecha)}</span>${badges.join(' ')}</div>
      <div class="equipos tri">${orden.map((eqIdx,i)=>
        `<div class="eq ${i===0?'win':''}"><div class="ename"><span>Equipo ${eqIdx+1}</span><span class="${i===0?'res-g':i===1?'res-e':'res-p'}">${pos[i]}</span></div>
         <ul>${t.equipos[eqIdx].map(x=>`<li>${esc(jnom(x))}</li>`).join('')}</ul></div>`).join('')}</div>`;
    if(isAdmin){
      const acts=el('div',{className:'pacts'});
      acts.appendChild(el('button',{className:'btn small',textContent:'✎ Editar',onclick:()=>formTri(t)}));
      acts.appendChild(el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{ if(confirm('¿Eliminar triangular?')){ S.triangulares=S.triangulares.filter(x=>x.id!==t.id); marcar(); render(); }}}));
      c.appendChild(acts);
    }
    m.appendChild(c);
  });
}
</script>

<script>
/* ---------- VOTACIÓN MVP ---------- */
function vVotacion(m){
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Votación de MVP</h2>
  <div class="hint">Elegí un partido, registrá los votos y al cerrar la votación el más votado queda como MVP (y suma ${S.config.puntos.mvp} punto${S.config.puntos.mvp===1?'':'s'}). Los votos se cargan desde el dispositivo del admin: los jugadores le pasan su voto por el grupo.</div>`;
  const evs=[...S.partidos.map(x=>({...x,_t:'p'})),...S.triangulares.map(x=>({...x,_t:'t'}))]
    .filter(x=>matchTorneo(torneoFiltro,x.torneoId)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!evs.length){ p.appendChild(el('div',{className:'empty',textContent:'No hay partidos para votar.'})); m.appendChild(p); return; }
  const sel=el('select'); evs.forEach(e=> sel.appendChild(el('option',{value:e._t+':'+e.id, textContent:`${e._t==='t'?'Triangular':'Partido'} · ${fFecha(e.fecha)}${e.mvpId?' · MVP: '+jnom(e.mvpId):''}`})));
  const box=el('div');
  const f=el('div',{className:'field'}); f.appendChild(el('label',{textContent:'Partido'})); f.appendChild(sel);
  p.appendChild(f); p.appendChild(box); m.appendChild(p);
  const draw=()=>{
    const [t,id]=sel.value.split(':');
    const ev = (t==='p'?S.partidos:S.triangulares).find(x=>x.id===id);
    const participantes = t==='p' ? [...ev.e1,...ev.e2] : ev.equipos.flat();
    box.innerHTML='';
    const votos = ev.votos||{};
    const tally={}; participantes.forEach(x=>tally[x]=0);
    Object.values(votos).forEach(c=>{ tally[c]=(tally[c]||0)+1; });
    const max=Math.max(1,...Object.values(tally));
    const totalVotos = Object.keys(votos).length;
    const tl=el('div',{className:'voto-tally'});
    participantes.map(x=>[x,tally[x]||0]).sort((a,b)=>b[1]-a[1]).forEach(([x,n])=>{
      tl.innerHTML+=`<div class="vbar"><span>${esc(jnom(x))}</span><div class="bar"><i style="width:${n/max*100}%"></i></div><b>${n}</b></div>`;
    });
    box.appendChild(el('div',{className:'small muted',textContent:`${totalVotos} voto${totalVotos===1?'':'s'} registrados · ${ev.votacionAbierta?'votación ABIERTA':'votación cerrada'}${ev.mvpId?' · MVP actual: '+jnom(ev.mvpId):''}`}));
    box.appendChild(tl);
    if(isAdmin){
      const fr=el('div',{className:'rowflex',style:'margin-top:14px'});
      const sv=el('select'); sv.appendChild(el('option',{value:'',textContent:'¿Quién vota?'}));
      jugadoresActivos().forEach(j=>sv.appendChild(el('option',{value:j.id,textContent:j.nombre+(votos[j.id]?' ✓':'')})));
      const sc=el('select'); sc.appendChild(el('option',{value:'',textContent:'Vota a…'}));
      participantes.forEach(x=>sc.appendChild(el('option',{value:x,textContent:jnom(x)})));
      const badd=el('button',{className:'btn',textContent:'Registrar voto',onclick:()=>{
        if(!sv.value||!sc.value) return toast('Elegí votante y candidato');
        if(sv.value===sc.value) return toast('No se puede autovotar 😅');
        ev.votos=ev.votos||{}; ev.votos[sv.value]=sc.value; ev.votacionAbierta=true; marcar(); draw();
      }});
      const bopen=el('button',{className:'btn ghost',textContent:ev.votacionAbierta?'Reabrir/limpiar votos':'Abrir votación',onclick:()=>{
        if(ev.votacionAbierta && confirm('¿Borrar todos los votos?')) ev.votos={};
        ev.votacionAbierta=true; marcar(); draw();
      }});
      const bclose=el('button',{className:'btn primary',textContent:'Cerrar y asignar MVP',onclick:()=>{
        const entries=Object.entries(tally).filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]);
        if(!entries.length) return toast('No hay votos');
        if(entries.length>1 && entries[0][1]===entries[1][1]) return toast('Empate: registrá un voto de desempate o asigná el MVP editando el partido');
        ev.mvpId=entries[0][0]; ev.votacionAbierta=false; marcar(); toast('MVP: '+jnom(ev.mvpId)+' ⭐'); draw();
      }});
      fr.append(sv,sc,badd,bopen,bclose); box.appendChild(fr);
    }
  };
  sel.onchange=draw; draw();
}

/* ---------- MMR ---------- */
let mmrSel = null;
function vMMR(m){
  const {ratings,hist}=getCache().mmr;
  const rows = S.jugadores.filter(j=>j.activo!==false).map(j=>({id:j.id,nombre:j.nombre,r:ratings[j.id],h:hist[j.id]})).sort((a,b)=>b.r-a.r);
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Ranking MMR</h2>
  <div class="hint">Elo por equipos: todos arrancan en ${S.config.mmr.inicial} y cada partido mueve el puntaje según el resultado y la diferencia contra el promedio rival (K=${S.config.mmr.K}). Se recalcula siempre desde el historial completo. Este número se usa para armar equipos parejos.</div>`;
  let html=`<div class="tablewrap"><table class="tabla mmr-table"><thead><tr><th>#</th><th class="nombre">Jugador</th><th>MMR</th><th>Último Δ</th><th>Evolución</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const last=r.h.length>1? r.h[r.h.length-1].delta : 0;
    html+=`<tr><td class="rank">${i+1}</td><td class="nombre">${esc(r.nombre)}</td><td class="mmr">${fmt(r.r,1)}</td>
      <td>${r.h.length>1?`<span class="${last>=0?'delta-pos':'delta-neg'}">${last>=0?'▲':'▼'} ${fmt(Math.abs(last),1)}</span>`:'—'}</td>
      <td class="spark">${spark(r.h.map(x=>x.r))}</td></tr>`;
  });
  p.innerHTML+=html+'</tbody></table></div>'; m.appendChild(p);

  // Gráfico evolución
  const p2=el('div',{className:'panel'});
  p2.innerHTML=`<h2 class="display">Evolución</h2><div class="hint">Tocá los nombres para comparar hasta 6 jugadores.</div>`;
  if(!mmrSel) mmrSel = new Set(rows.slice(0,4).map(r=>r.id));
  const colores=['#f2c13d','#4cb872','#5aa7d6','#e05548','#c48ef2','#f2985a'];
  const leg=el('div',{className:'legend'});
  rows.forEach(r=>{
    const on=mmrSel.has(r.id);
    const b=el('span',{className:'lg'+(on?' on':''),onclick:()=>{ on?mmrSel.delete(r.id):(mmrSel.size<6&&mmrSel.add(r.id)); render(); }});
    if(on) b.innerHTML=`<span class="dot" style="background:${colores[[...mmrSel].indexOf(r.id)%6]}"></span>`;
    b.appendChild(document.createTextNode(r.nombre));
    leg.appendChild(b);
  });
  p2.appendChild(leg);
  const series=[...mmrSel].map((id,i)=>({nombre:jnom(id), color:colores[i%6], pts:hist[id].map(x=>x.r)}));
  p2.appendChild(chartLineas(series));
  m.appendChild(p2);
}
function spark(vals){
  if(vals.length<2) return '<span class="muted small">—</span>';
  const w=120,h=30,min=Math.min(...vals),max=Math.max(...vals),rg=(max-min)||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-3-(v-min)/rg*(h-6)).toFixed(1)}`).join(' ');
  const up=vals[vals.length-1]>=vals[0];
  return `<svg width="${w}" height="${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${up?'var(--verde)':'var(--rojo)'}" stroke-width="1.8"/></svg>`;
}
function chartLineas(series){
  const wrap=el('div');
  if(!series.length || series.every(s=>s.pts.length<2)){ wrap.innerHTML='<div class="empty">Elegí jugadores con partidos jugados.</div>'; return wrap; }
  const W=980,H=340,pad={l:52,r:14,t:14,b:26};
  const all=series.flatMap(s=>s.pts);
  const min=Math.floor(Math.min(...all)/25)*25, max=Math.ceil(Math.max(...all)/25)*25;
  const maxN=Math.max(...series.map(s=>s.pts.length));
  const X=i=> pad.l+(maxN<2?0:i/(maxN-1))*(W-pad.l-pad.r);
  const Y=v=> pad.t+(1-(v-min)/((max-min)||1))*(H-pad.t-pad.b);
  let g='';
  for(let v=min; v<=max; v+=Math.max(25,Math.round((max-min)/6/25)*25)){
    g+=`<line x1="${pad.l}" x2="${W-pad.r}" y1="${Y(v)}" y2="${Y(v)}" stroke="rgba(233,242,228,.08)"/><text x="${pad.l-8}" y="${Y(v)+4}" fill="var(--muted)" font-size="11" text-anchor="end">${v}</text>`;
  }
  series.forEach(s=>{
    const pts=s.pts.map((v,i)=>`${X(i)},${Y(v)}`).join(' ');
    g+=`<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round"/>`;
    g+=`<circle cx="${X(s.pts.length-1)}" cy="${Y(s.pts.at(-1))}" r="3.4" fill="${s.color}"/>`;
  });
  g+=`<text x="${pad.l}" y="${H-6}" fill="var(--muted)" font-size="11">→ partidos jugados</text>`;
  wrap.innerHTML=`<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Evolución de MMR">${g}</svg>`;
  return wrap;
}

/* ---------- SORTEO / ARMAR EQUIPOS ---------- */
let anotados = new Set();
let nEquipos = 2;
function vSorteo(m){
  const {ratings}=getCache().mmr;
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Armar equipos por MMR</h2>
  <div class="hint">Marcá quiénes están anotados y la app arma los equipos más parejos posibles según el MMR de cada uno.</div>`;
  const grid=el('div',{className:'anota'});
  jugadoresActivos().forEach(j=>{
    const lb=el('label');
    const cb=el('input',{type:'checkbox',checked:anotados.has(j.id),onchange:()=>{cb.checked?anotados.add(j.id):anotados.delete(j.id); cnt.textContent=`${anotados.size} anotados`;}});
    lb.append(cb, document.createTextNode(j.nombre), el('span',{className:'m',textContent:fmt(ratings[j.id]??S.config.mmr.inicial,0)}));
    grid.appendChild(lb);
  });
  p.appendChild(grid);
  const fr=el('div',{className:'rowflex'});
  const cnt=el('span',{className:'muted',textContent:`${anotados.size} anotados`});
  const seln=el('select'); [[2,'2 equipos'],[3,'3 equipos (triangular)']].forEach(([v,l])=>seln.appendChild(el('option',{value:v,textContent:l})));
  seln.value=nEquipos; seln.onchange=()=>nEquipos=+seln.value;
  const out=el('div',{className:'teams-out'});
  const go=el('button',{className:'btn primary',textContent:'⚖ Armar equipos',onclick:()=>{
    if(anotados.size<nEquipos*2) return toast('Anotá al menos '+(nEquipos*2)+' jugadores');
    dibujarEquipos(out, balancear([...anotados], nEquipos, ratings), ratings);
  }});
  const limpiar=el('button',{className:'btn ghost',textContent:'Limpiar',onclick:()=>{anotados.clear(); render();}});
  fr.append(cnt, el('span',{className:'spacer'}), seln, go, limpiar);
  p.appendChild(fr); p.appendChild(out); m.appendChild(p);
}
function balancear(ids, n, r){
  const rating=id=> r[id] ?? S.config.mmr.inicial;
  const sizes=Array.from({length:n},(_,i)=> Math.floor(ids.length/n)+(i< ids.length%n ?1:0));
  let best=null, bestSpread=Infinity;
  for(let it=0; it<600; it++){
    const arr=[...ids].sort((a,b)=> rating(b)-rating(a) + (Math.random()-.5)*(it?90:0));
    const teams=Array.from({length:n},()=>[]);
    for(const id of arr){
      let bi=-1,bs=Infinity;
      teams.forEach((t,i)=>{ if(t.length<sizes[i]){ const s=t.reduce((a,x)=>a+rating(x),0); if(s<bs){bs=s;bi=i;} } });
      teams[bi].push(id);
    }
    // mejora por swaps
    for(let pass=0; pass<3; pass++){
      for(let i=0;i<n;i++) for(let j=i+1;j<n;j++)
        for(let a=0;a<teams[i].length;a++) for(let b=0;b<teams[j].length;b++){
          const avg=t=>t.reduce((s,x)=>s+rating(x),0)/t.length;
          const cur=Math.abs(avg(teams[i])-avg(teams[j]));
          [teams[i][a],teams[j][b]]=[teams[j][b],teams[i][a]];
          if(Math.abs(avg(teams[i])-avg(teams[j]))>=cur) [teams[i][a],teams[j][b]]=[teams[j][b],teams[i][a]];
        }
    }
    const avgs=teams.map(t=>t.reduce((s,x)=>s+rating(x),0)/t.length);
    const spread=Math.max(...avgs)-Math.min(...avgs);
    if(spread<bestSpread){ bestSpread=spread; best=teams.map(t=>[...t]); }
  }
  return best;
}
function dibujarEquipos(out, teams, r){
  const rating=id=> r[id] ?? S.config.mmr.inicial;
  out.innerHTML='';
  let txt='⚽ Equipos armados por MMR\n';
  teams.forEach((t,i)=>{
    t.sort((a,b)=>rating(b)-rating(a));
    const tot=t.reduce((s,x)=>s+rating(x),0);
    const d=el('div',{className:'tout'});
    d.innerHTML=`<h4>Equipo ${i+1}<span>${t.length} jug.</span></h4><ol>${t.map(x=>`<li><span>${esc(jnom(x))}</span><span>${fmt(rating(x),0)}</span></li>`).join('')}</ol>
    <div class="avg">Total <b>${fmt(tot,0)}</b> · Promedio <b>${fmt(tot/t.length,1)}</b></div>`;
    out.appendChild(d);
    txt+=`\n*Equipo ${i+1}* (prom ${fmt(tot/t.length,0)}):\n`+t.map(x=>'• '+jnom(x)).join('\n')+'\n';
  });
  const avgs=teams.map(t=>t.reduce((s,x)=>s+rating(x),0)/t.length);
  const bar=el('div',{className:'rowflex',style:'margin-top:10px'});
  bar.appendChild(el('span',{className:'muted small',textContent:`Diferencia de promedios: ${fmt(Math.max(...avgs)-Math.min(...avgs),1)} MMR`}));
  bar.appendChild(el('span',{className:'spacer'}));
  bar.appendChild(el('button',{className:'btn small',textContent:'📋 Copiar para WhatsApp',onclick:async()=>{ try{ await navigator.clipboard.writeText(txt); toast('Copiado'); }catch(e){ toast('No se pudo copiar'); } }}));
  out.appendChild(bar);
}

/* ---------- MATRIZ ---------- */
function vMatriz(m){
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Matriz de rivalidades · ${esc(nombreFiltro())}</h2>
  <div class="hint">Cada celda: (veces que la fila le ganó a la columna) − (veces que perdió contra ella), jugando en equipos rivales. Verde = lo domina, rojo = lo sufre.</div>`;
  const ids = jugadoresActivos().map(j=>j.id);
  const M={}; ids.forEach(a=>{M[a]={}; ids.forEach(b=>M[a][b]=0);});
  for(const pt of S.partidos){
    if(!matchTorneo(torneoFiltro,pt.torneoId) || pt.res==='E') continue;
    const win=pt.res==='E1'?pt.e1:pt.e2, lose=pt.res==='E1'?pt.e2:pt.e1;
    win.forEach(w=>lose.forEach(l=>{ if(M[w]&&M[w][l]!=null){M[w][l]++; M[l][w]--;} }));
  }
  const jugados = ids.filter(a=> ids.some(b=>M[a][b]!==0));
  const cols = jugados.length? jugados : ids;
  let html='<div class="matriz"><table><tr><th class="row"></th>'+cols.map(c=>`<th title="${esc(jnom(c))}">${esc(jnom(c).slice(0,6))}</th>`).join('')+'</tr>';
  cols.forEach(a=>{
    html+=`<tr><th class="row">${esc(jnom(a))}</th>`+cols.map(b=>{
      if(a===b) return '<td style="background:rgba(233,242,228,.06)"></td>';
      const v=M[a][b];
      return `<td class="${v>0?'p':v<0?'n':''}">${v||''}</td>`;
    }).join('')+'</tr>';
  });
  p.innerHTML+=html+'</table></div>'; m.appendChild(p);
}

/* ---------- SELECTOR DE EQUIPO (chips) ---------- */
function teamPicker(container, titulo, seleccion, otros){
  const box=el('div',{className:'field'});
  box.appendChild(el('label',{textContent:titulo}));
  const chips=el('div',{className:'chips'});
  const picker=el('div',{className:'picker'});
  const draw=()=>{
    chips.innerHTML='';
    seleccion.forEach(id=>{
      const c=el('span',{className:'chip'}); c.append(document.createTextNode(jnom(id)));
      const x=el('b',{textContent:'✕',onclick:()=>{ seleccion.splice(seleccion.indexOf(id),1); draw(); }});
      c.appendChild(x); chips.appendChild(c);
    });
    if(!seleccion.length) chips.appendChild(el('span',{className:'muted small',textContent:'Tocá abajo para agregar jugadores'}));
    picker.innerHTML='';
    jugadoresActivos().forEach(j=>{
      const usado = seleccion.includes(j.id) || otros().includes(j.id);
      picker.appendChild(el('button',{type:'button',textContent:j.nombre,disabled:usado,onclick:()=>{ seleccion.push(j.id); draw(); }}));
    });
    if(box._onchange) box._onchange();
  };
  box.append(chips,picker); box._redraw=draw; draw();
  container.appendChild(box);
  return box;
}
function multiSel(id, opciones, valores){
  return `<select id="${id}" multiple size="4" style="width:100%">${opciones.map(o=>`<option value="${o.id}" ${valores.includes(o.id)?'selected':''}>${esc(o.nombre)}</option>`).join('')}</select>`;
}
function selVals(id){ return [...$('#'+id).selectedOptions].map(o=>o.value); }

<script>
/* ---------- FORM PARTIDO ---------- */
function formPartido(pt){
  const editando=!!pt;
  const e1=[...(pt?.e1||[])], e2=[...(pt?.e2||[])];
  const tsel = S.torneos.map(t=>`<option value="${t.id}" ${pt?.torneoId===t.id?'selected':''}>${esc(t.nombre)}</option>`).join('')
    + `<option value="" ${pt&&pt.torneoId==null?'selected':''}>Amistoso (solo MMR, sin puntos)</option>`;
  openModal(`<h3 class="display">${editando?'Editar':'Nuevo'} partido</h3>
    <div class="grid2">
      <div class="field"><label>Fecha</label><input type="date" id="fFecha" value="${pt?.fecha||hoy()}"></div>
      <div class="field"><label>Torneo</label><select id="fTorneo">${tsel}</select></div>
    </div>
    <div id="teams"></div>
    <div class="grid3">
      <div class="field"><label>Resultado</label><select id="fRes">
        <option value="E1" ${pt?.res==='E1'?'selected':''}>Ganó Equipo 1</option>
        <option value="E2" ${pt?.res==='E2'?'selected':''}>Ganó Equipo 2</option>
        <option value="E" ${pt?.res==='E'?'selected':''}>Empate</option></select></div>

      <div class="field"><label>&nbsp;</label><label class="check"><input type="checkbox" id="fMMR" ${pt?.cuentaMMR===false?'':'checked'}> Cuenta para MMR</label></div>
    </div>
    <div class="grid3">
      <div class="field"><label>MVP</label><select id="fMvp"></select></div>
      <div class="field"><label>Domadores (ctrl/⌘ para varios)</label><div id="fDomWrap"></div></div>
      <div class="field"><label>Domados</label><div id="fDodWrap"></div></div>
    </div>
    <div class="modalacts"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="fOk">${editando?'Guardar cambios':'Cargar partido'}</button></div>`);
  const tdiv=$('#teams');
  const b1=teamPicker(tdiv,'Equipo 1',e1,()=>e2);
  const b2=teamPicker(tdiv,'Equipo 2',e2,()=>e1);
  let refreshing=false;
  const refreshParticipantes=()=>{
    if(refreshing) return; refreshing=true;
    [b1,b2].forEach(b=>b._redraw());
    refreshing=false;
    const parts=[...e1,...e2].map(id=>({id,nombre:jnom(id)}));
    $('#fMvp').innerHTML='<option value="">— Sin MVP / se vota después —</option>'+parts.map(o=>`<option value="${o.id}" ${pt?.mvpId===o.id?'selected':''}>${esc(o.nombre)}</option>`).join('');
    $('#fDomWrap').innerHTML=multiSel('fDom',parts,pt?.domadores||[]);
    $('#fDodWrap').innerHTML=multiSel('fDod',parts,pt?.domados||[]);
  };
  b1._onchange=refreshParticipantes; b2._onchange=refreshParticipantes; refreshParticipantes();
  $('#fOk').onclick=()=>{
    if(e1.length<1||e2.length<1) return toast('Cargá jugadores en los dos equipos');
    const obj={
      id: pt?.id||uid('p'), fecha:$('#fFecha').value||hoy(),
      torneoId: $('#fTorneo').value||null,

      cuentaMMR: $('#fMMR').checked, votos: pt?.votos||{}, votacionAbierta: pt?.votacionAbierta||false
    };
    if(editando) S.partidos[S.partidos.findIndex(x=>x.id===pt.id)]=obj; else S.partidos.push(obj);
    marcar(); closeModal(); render(); toast(editando?'Partido actualizado':'Partido cargado — tabla y MMR recalculados');
  };

/* ---------- FORM TRIANGULAR ---------- */
function formTri(t){
  const editando=!!t;
  const eqs=[[...(t?.equipos?.[0]||[])],[...(t?.equipos?.[1]||[])],[...(t?.equipos?.[2]||[])]];
  const tsel=S.torneos.map(x=>`<option value="${x.id}" ${t?.torneoId===x.id?'selected':''}>${esc(x.nombre)}</option>`).join('');
  const posSel=(id,val)=>`<select id="${id}">${[0,1,2].map(i=>`<option value="${i}" ${val===i?'selected':''}>Equipo ${i+1}</option>`).join('')}</select>`;
  openModal(`<h3 class="display">${editando?'Editar':'Nuevo'} triangular</h3>
    <div class="grid2">
      <div class="field"><label>Fecha</label><input type="date" id="fFecha" value="${t?.fecha||hoy()}"></div>
      <div class="field"><label>Torneo</label><select id="fTorneo">${tsel}</select></div>
    </div>
    <div id="teams"></div>
    <div class="grid3">
      <div class="field"><label>🥇 1° puesto</label>${posSel('fP1',t?.posiciones?.[0]??0)}</div>
      <div class="field"><label>🥈 2° puesto</label>${posSel('fP2',t?.posiciones?.[1]??1)}</div>
      <div class="field"><label>🥉 3° puesto</label>${posSel('fP3',t?.posiciones?.[2]??2)}</div>
    </div>
    <div class="grid2">
      <div class="field"><label>MVP</label><select id="fMvp"></select></div>
      <div class="field"><label>Ganó 4 partidos (bonus)</label><div id="fG4Wrap"></div></div>
      <div class="field"><label>Domadores (duelo)</label><div id="fDomWrap"></div></div>
      <div class="field"><label>Domados (duelo)</label><div id="fDodWrap"></div></div>
    </div>
    <label class="check" style="margin-bottom:6px"><input type="checkbox" id="fMMR" ${t?.cuentaMMR?'checked':(editando?'':'checked')}> Cuenta para MMR</label>
    <div class="modalacts"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="fOk">${editando?'Guardar cambios':'Cargar triangular'}</button></div>`);
  const tdiv=$('#teams');
  const boxes=eqs.map((eq,i)=> teamPicker(tdiv,`Equipo ${i+1}`,eq,()=> eqs.flatMap((q,j)=> j===i?[]:q)));
  let refreshing=false;
  const refresh=()=>{
    if(refreshing) return; refreshing=true;
    boxes.forEach(b=>b._redraw());
    refreshing=false;
    const parts=eqs.flat().map(id=>({id,nombre:jnom(id)}));
    $('#fMvp').innerHTML='<option value="">— Sin MVP —</option>'+parts.map(o=>`<option value="${o.id}" ${t?.mvpId===o.id?'selected':''}>${esc(o.nombre)}</option>`).join('');
    $('#fG4Wrap').innerHTML=multiSel('fG4',parts,t?.gano4||[]);
    $('#fDomWrap').innerHTML=multiSel('fDom',parts,t?.domadores||[]);
    $('#fDodWrap').innerHTML=multiSel('fDod',parts,t?.domados||[]);
  };
  boxes.forEach(b=>b._onchange=refresh); refresh();
  $('#fOk').onclick=()=>{
    if(eqs.some(q=>q.length<1)) return toast('Cargá jugadores en los tres equipos');
    const pos=[+$('#fP1').value,+$('#fP2').value,+$('#fP3').value];
    if(new Set(pos).size!==3) return toast('Las posiciones tienen que ser tres equipos distintos');
    const obj={ id:t?.id||uid('tr'), fecha:$('#fFecha').value||hoy(), torneoId:$('#fTorneo').value,
      equipos:eqs.map(q=>[...q]), posiciones:pos, gano4:selVals('fG4'), mvpId:$('#fMvp').value||null,
      domadores:selVals('fDom'), domados:selVals('fDod'), cuentaMMR:$('#fMMR').checked,
      votos:t?.votos||{}, votacionAbierta:t?.votacionAbierta||false };
    if(editando) S.triangulares[S.triangulares.findIndex(x=>x.id===t.id)]=obj; else S.triangulares.push(obj);
    marcar(); closeModal(); render(); toast('Triangular guardado');
  };
}

/* ---------- MODAL ---------- */
function openModal(html){ $('#modal').innerHTML=html; $('#overlay').classList.add('on'); }
function closeModal(){ $('#overlay').classList.remove('on'); }
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>

<script>
/* ---------- CONFIGURACIÓN ---------- */
function vConfig(m){
  if(!isAdmin){ m.appendChild(el('div',{className:'empty',textContent:'Sección solo para el admin.'})); return; }
  const C=S.config, P=C.puntos;
  const p=el('div',{className:'panel'});
  const pf=(k,l)=>`<div class="field"><label>${l}</label><input type="number" step="0.5" data-p="${k}" value="${P[k]}"></div>`;
  p.innerHTML=`<h2 class="display">Puntos por evento</h2>
    <div class="hint">Cambiá cualquier valor y toda la tabla se recalcula al instante (también hacia atrás).</div>
    <div class="pgrid">
      ${pf('pj','Partido jugado')}${pf('g','Victoria')}${pf('e','Empate')}${pf('p','Derrota')}
      ${pf('mvp','MVP')}${pf('domador','Domador')}${pf('domado','Domado')}
      ${pf('goleadaFavor','Goleada a favor')}${pf('goleadaContra','Goleada en contra')}
      ${pf('tri1','Triangular 1°')}${pf('tri2','Triangular 2°')}${pf('tri3','Triangular 3°')}${pf('gano4pj','Ganó 4PJ (triangular)')}
    </div>`;
  p.querySelectorAll('[data-p]').forEach(i=> i.onchange=()=>{ P[i.dataset.p]=+i.value||0; marcar(); toast('Puntos actualizados'); });
  m.appendChild(p);

  const p2=el('div',{className:'panel'});
  p2.innerHTML=`<h2 class="display">MMR y tabla</h2><div class="grid3">
    <div class="field"><label>MMR inicial</label><input type="number" id="cIni" value="${C.mmr.inicial}"></div>
    <div class="field"><label>Factor K (sensibilidad)</label><input type="number" id="cK" value="${C.mmr.K}"></div>
    <div class="field"><label>Corte zona Primera (puestos)</label><input type="number" id="cZona" value="${C.zonaCorte}"></div>
    <div class="field"><label>Orden por defecto de la tabla</label><select id="cOrden">
      <option value="mmr" ${C.ordenTabla==='mmr'?'selected':''}>MMR (como el Excel)</option>
      <option value="total" ${C.ordenTabla==='total'?'selected':''}>Total de puntos</option>
      <option value="ppp" ${C.ordenTabla==='ppp'?'selected':''}>Puntos por partido</option></select></div>
  </div>`;
  p2.querySelector('#cIni').onchange=e=>{C.mmr.inicial=+e.target.value||1000; marcar();};
  p2.querySelector('#cK').onchange=e=>{C.mmr.K=+e.target.value||100; marcar();};
  p2.querySelector('#cZona').onchange=e=>{C.zonaCorte=Math.max(1,+e.target.value||16); marcar();};
  p2.querySelector('#cOrden').onchange=e=>{C.ordenTabla=e.target.value; ordenCol=null; marcar();};
  m.appendChild(p2);

  const p3=el('div',{className:'panel'});
  p3.innerHTML=`<div class="rowflex"><h2 class="display">Torneos</h2><span class="spacer"></span><button class="btn primary" id="cNuevoT">+ Nuevo torneo</button></div>`;
  const ul=el('div');
  S.torneos.forEach(t=>{
    const r=el('div',{className:'rowflex',style:'padding:6px 0;border-bottom:1px dashed var(--line)'});
    r.append(el('b',{textContent:t.nombre}), el('span',{className:'spacer'}),
      el('button',{className:'btn small',textContent:'✎ Renombrar',onclick:()=>{const n=prompt('Nombre del torneo',t.nombre); if(n&&n.trim()){t.nombre=n.trim(); marcar(); render();}}}),
      el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{
        const usado=S.partidos.some(x=>x.torneoId===t.id)||S.triangulares.some(x=>x.torneoId===t.id)||S.sanciones.some(x=>x.torneoId===t.id);
        if(usado) return toast('Tiene partidos o sanciones cargados: no se puede eliminar');
        if(confirm('¿Eliminar torneo vacío?')){ S.torneos=S.torneos.filter(x=>x.id!==t.id); marcar(); render(); }
      }}));
    ul.appendChild(r);
  });
  p3.appendChild(ul);
  p3.querySelector('#cNuevoT').onclick=()=>{ const n=prompt('Nombre del nuevo torneo (ej: Apertura 2026)'); if(n&&n.trim()){ const t={id:uid('t'),nombre:n.trim()}; S.torneos.push(t); torneoFiltro=t.id; marcar(); render(); toast('Torneo creado'); } };
  m.appendChild(p3);

  const p4=el('div',{className:'panel'});
  p4.innerHTML=`<h2 class="display">Publicación (GitHub Pages)</h2>
    <div class="hint">La página que ven todos lee un archivo <code>data.json</code> del repositorio. Cuando cargás datos, quedan solo en este dispositivo hasta que los publiques. Podés publicar automático con un token de GitHub, o descargar el <code>data.json</code> y subirlo a mano.</div>
    <div class="grid3">
      <div class="field"><label>Usuario/organización</label><input type="text" id="ghOwner" value="${esc(C.github.owner)}" placeholder="mi-usuario"></div>
      <div class="field"><label>Repositorio</label><input type="text" id="ghRepo" value="${esc(C.github.repo)}" placeholder="liga-prudan"></div>
      <div class="field"><label>Rama</label><input type="text" id="ghBranch" value="${esc(C.github.branch||'main')}"></div>
    </div>
    <div class="field"><label>Token de GitHub (fine-grained, permiso Contents de ese repo). Se guarda solo en este navegador.</label>
      <input type="password" id="ghToken" value="${esc(store.get('ghToken')||'')}" placeholder="github_pat_…"></div>
    <div class="rowflex"><button class="btn" id="ghSave">Guardar configuración</button></div>`;
  p4.querySelector('#ghSave').onclick=()=>{
    C.github.owner=$('#ghOwner').value.trim(); C.github.repo=$('#ghRepo').value.trim(); C.github.branch=$('#ghBranch').value.trim()||'main';
    store.set('ghToken', $('#ghToken').value.trim()); marcar(); toast('Configuración guardada');
  };
  m.appendChild(p4);

  const p5=el('div',{className:'panel'});
  p5.innerHTML=`<h2 class="display">Datos y seguridad</h2>
    <div class="rowflex" style="margin-bottom:10px">
      <button class="btn" id="dExp">⬇ Exportar respaldo (JSON)</button>
      <button class="btn" id="dImp">⬆ Importar respaldo</button>
      <input type="file" id="dFile" accept=".json" style="display:none">
      <button class="btn" id="dPin">Cambiar PIN de admin</button>
    </div>
    <div class="hint">El PIN solo esconde los controles de edición en la página: la protección real es que nadie más tiene el token de GitHub para publicar. PIN actual por defecto: <code>prudan</code> — cambialo.</div>`;
  p5.querySelector('#dExp').onclick=descargarData;
  p5.querySelector('#dImp').onclick=()=>$('#dFile').click();
  p5.querySelector('#dFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    f.text().then(t=>{ try{ const d=JSON.parse(t); if(!d.jugadores||!d.partidos) throw 0; S=d; marcar(); render(); toast('Datos importados'); }catch(err){ toast('El archivo no es un respaldo válido'); } });
  };
  p5.querySelector('#dPin').onclick=()=>{ const n=prompt('Nuevo PIN de admin'); if(n&&n.trim()){ S.config.adminPin=n.trim(); marcar(); toast('PIN actualizado'); } };
  m.appendChild(p5);
}

/* ---------- Publicar / descargar ---------- */
function descargarData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=el('a',{href:URL.createObjectURL(blob),download:'data.json'}); document.body.appendChild(a); a.click(); a.remove();
  toast('data.json descargado: subilo al repositorio para publicar');
}
async function publicarGitHub(){
  const g=S.config.github, token=store.get('ghToken');
  if(!g.owner||!g.repo) { tab='config'; render(); return toast('Completá usuario y repositorio en Configuración'); }
  if(!token){ tab='config'; render(); return toast('Falta el token de GitHub en Configuración'); }
  const api=`https://api.github.com/repos/${g.owner}/${g.repo}/contents/${g.path||'data.json'}`;
  const H={ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json' };
  try{
    $('#btnPublicar').disabled=true; $('#btnPublicar').textContent='Publicando…';
    let sha=null;
    const r0=await fetch(`${api}?ref=${g.branch||'main'}`,{headers:H});
    if(r0.ok) sha=(await r0.json()).sha;
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(S,null,1))));
    const body={ message:'Actualización de datos — Liga Prudan', content, branch:g.branch||'main' };
    if(sha) body.sha=sha;
    const r=await fetch(api,{method:'PUT',headers:H,body:JSON.stringify(body)});
    if(!r.ok) throw new Error((await r.json()).message||r.status);
    dirty=false; $('#dirty').textContent='✓ Publicado '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); $('#dirty').style.color='var(--verde)';
    toast('Publicado. En ~1 minuto lo ven todos.');
  }catch(e){ toast('Error al publicar: '+e.message); }
  finally{ $('#btnPublicar').disabled=false; $('#btnPublicar').textContent='☁ Publicar en GitHub'; }
}

/* ---------- Admin toggle ---------- */
$('#btnAdmin').onclick=()=>{
  if(isAdmin){ isAdmin=false; store.del('prudanAdmin'); if(tab==='config') tab='tabla'; render(); return; }
  const pin=prompt('PIN de administrador:');
  if(pin===S.config.adminPin){ isAdmin=true; store.set('prudanAdmin','1'); render(); toast('Modo admin activado'); }
  else if(pin!=null) toast('PIN incorrecto');
};
$('#btnDescargar').onclick=descargarData;
$('#btnPublicar').onclick=publicarGitHub;

/* ---------- BOOT ---------- */
async function boot(){
  let base=null;
  try{ const r=await fetch('data.json',{cache:'no-store'}); if(r.ok) base=await r.json(); }catch(e){}
  let local=null;
  try{ const t=store.get('prudanData'); if(t) local=JSON.parse(t); }catch(e){}
  if(base&&local) S = (local.updatedAt||'') > (base.updatedAt||'') ? local : base;
  else S = base || local || SEED;
  if(!S.config.github) S.config.github={owner:'',repo:'',branch:'main',path:'data.json'};
  isAdmin = store.get('prudanAdmin')==='1';
  torneoFiltro = S.torneos.at(-1)?.id || 'ALL';
  $('#hLiga').textContent = (S.config.nombreLiga||'Prudan').replace(/^Copa de la Liga\s*/i,'') || 'Prudan';
  if(dirtyCheck(base,local)) { $('#dirty').textContent='● Cambios sin publicar'; $('#dirty').style.color='var(--amarillo)'; dirty=true; }
  render();
}
function dirtyCheck(base,local){ return !!(local && (!base || (local.updatedAt||'')>(base.updatedAt||''))); }
boot();
</script>
</body>
</html>
