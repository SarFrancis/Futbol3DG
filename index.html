<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa de la Liga Matheu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f3ec; --panel:#ffffff; --panel2:#faf9f4; --line:#e3dfd2; --line2:#d0cbba;
  --ink:#22301f; --muted:#7a7565; --verde:#1e7a3c; --verde2:#2e9e54; --verde-suave:#e7f3ea;
  --amarillo:#e6a817; --amarillo-suave:#fdf3dc; --rojo:#c8493a; --rojo-suave:#fbe9e6;
  --azul:#2f6fae; --azul-suave:#e8f0f8;
  --r:12px; --shadow:0 1px 3px rgba(40,50,30,.08), 0 4px 14px rgba(40,50,30,.05);
}
*{box-sizing:border-box; margin:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg); color:var(--ink); font:15px/1.5 'Inter',system-ui,sans-serif; padding-bottom:70px}
.display{font-family:'Anton',sans-serif; letter-spacing:.02em; font-weight:400; text-transform:uppercase}

/* ---------- header ---------- */
header{background:linear-gradient(135deg,#14532d 0%,#1e7a3c 60%,#2e9e54 100%); color:#fff; padding:14px 16px 0; box-shadow:var(--shadow); position:sticky; top:0; z-index:40}
.hrow{display:flex; align-items:center; gap:12px; max-width:1180px; margin:0 auto; flex-wrap:wrap}
.copa h1{font-size:clamp(20px,4vw,30px); line-height:1}
.copa .liga{color:#ffd75e}
.tsel{margin-left:auto; background:rgba(255,255,255,.14); color:#fff; border:1px solid rgba(255,255,255,.35); border-radius:8px; padding:7px 10px; font:600 13px 'Inter'; max-width:46vw}
.tsel option{color:#222}
#btnAdmin{border-color:rgba(255,255,255,.4); color:#fff; background:rgba(255,255,255,.1)}
#adminbar{display:none; max-width:1180px; margin:10px auto 0; background:rgba(0,0,0,.22); border-radius:10px 10px 0 0; padding:8px 12px; font-size:13px; align-items:center; gap:12px; flex-wrap:wrap}
#adminbar.on{display:flex}
nav.tabs{max-width:1180px; margin:10px auto 0; display:flex; gap:2px; overflow-x:auto; scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
nav.tabs button{flex:0 0 auto; background:transparent; color:rgba(255,255,255,.75); border:0; border-bottom:3px solid transparent; padding:9px 13px; font:700 13px 'Inter'; cursor:pointer; border-radius:8px 8px 0 0}
nav.tabs button.on{color:#fff; background:var(--bg); color:var(--verde); border-bottom-color:var(--amarillo)}
nav.tabs button:hover:not(.on){background:rgba(255,255,255,.1); color:#fff}

/* ---------- layout ---------- */
main{max-width:1180px; margin:18px auto; padding:0 14px}
.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:14px; box-shadow:var(--shadow)}
.panel h2{font-size:22px; color:var(--verde); margin-bottom:6px}
.rowflex{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.spacer{flex:1}
.hint{font-size:13px; color:var(--muted); margin-bottom:10px}
.hint code{background:var(--panel2); border:1px solid var(--line); border-radius:4px; padding:0 4px}
.empty{background:var(--panel); border:1px dashed var(--line2); border-radius:var(--r); padding:34px; text-align:center; color:var(--muted)}
.muted{color:var(--muted)} .small{font-size:12px}
.pos{color:var(--verde); font-weight:700} .neg{color:var(--rojo); font-weight:700}

/* ---------- botones ---------- */
.btn{background:var(--panel); border:1px solid var(--line2); color:var(--ink); border-radius:9px; padding:8px 14px; font:700 13px 'Inter'; cursor:pointer; transition:.12s}
.btn:hover{border-color:var(--verde); color:var(--verde)}
.btn.primary{background:var(--verde); border-color:var(--verde); color:#fff}
.btn.primary:hover{background:var(--verde2)}
.btn.ghost{background:transparent}
.btn.small{padding:5px 10px; font-size:12px}
.btn.danger{color:var(--rojo); border-color:#e5c0ba}
.btn.danger:hover{background:var(--rojo-suave)}
.btn.wsp{background:#25d366; border-color:#25d366; color:#fff}
.btn:disabled{opacity:.5; cursor:default}

/* ---------- tabla ---------- */
.tablewrap{overflow-x:auto; border:1px solid var(--line); border-radius:10px}
table.tabla{border-collapse:collapse; width:100%; font-size:13.5px; background:#fff}
.tabla th{background:#20372a; color:#e8e4d5; font:700 11px 'Inter'; text-transform:uppercase; letter-spacing:.05em; padding:9px 8px; text-align:center; white-space:nowrap; cursor:pointer; position:sticky; top:0}
.tabla th.nombre{text-align:left}
.tabla th:hover{color:#ffd75e}
.tabla th.sorted{color:#ffd75e}
.tabla th.zh{cursor:default; width:34px}
.tabla td{padding:7px 8px; text-align:center; border-bottom:1px solid var(--line); white-space:nowrap}
.tabla td.nombre{text-align:left; font-weight:700; min-width:130px}
.tabla td.rank{color:var(--muted); font-weight:700; width:34px}
.tabla td.pts{font-weight:800; font-size:15px}
.tabla td.mmr{color:var(--azul); font-weight:700}
.tabla tbody tr:hover td{background:#f4f7f2}
/* zonas */
td.zcell{writing-mode:vertical-rl; transform:rotate(180deg); font-family:'Anton'; font-size:19px; letter-spacing:.24em; text-align:center; padding:6px 4px; border-right:3px solid}
td.zcell.zprimera{background:var(--verde-suave); color:var(--verde); border-right-color:var(--verde)}
td.zcell.zbnac{background:var(--azul-suave); color:var(--azul); border-right-color:var(--azul)}
td.zdot{width:10px; padding:0}
td.zdot.zprimera{background:var(--verde)} td.zdot.zbnac{background:var(--azul)}
tr.r-top td{background:var(--amarillo-suave)}
tr.r-desc td{background:var(--rojo-suave)}
tr.r-asc td{background:var(--verde-suave)}
tr.r-top:hover td,tr.r-desc:hover td,tr.r-asc:hover td{filter:brightness(.97)}
tr.zona-sep td{background:#20372a !important; padding:2px}
.leyenda{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin-top:10px}
.leyenda span::before{content:''; display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
.leyenda .l-top::before{background:var(--amarillo-suave); border:1px solid var(--amarillo)}
.leyenda .l-desc::before{background:var(--rojo-suave); border:1px solid var(--rojo)}
.leyenda .l-asc::before{background:var(--verde-suave); border:1px solid var(--verde)}
.chip-zona{font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:20px; padding:3px 10px}
.zona-h{text-align:center; margin:0 0 12px}
.zona-h .display{font-size:26px}
.zona-h.za .display{color:var(--verde)}
.zona-h.zb .display{color:var(--azul)}
.trango{text-align:center; font-size:12.5px; color:var(--muted); margin:2px 0 8px}
.tabla th.min{font-size:10px; padding:9px 5px}
.tabla td.min{font-size:12px; padding:7px 5px}

/* ---------- partidos (cards colapsables) ---------- */
details.pcard{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden}
details.pcard summary{list-style:none; cursor:pointer; padding:12px 16px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; user-select:none}
details.pcard summary::-webkit-details-marker{display:none}
details.pcard summary:hover{background:var(--panel2)}
details.pcard summary .caret{margin-left:auto; color:var(--muted); transition:.15s; font-size:12px}
details.pcard[open] summary .caret{transform:rotate(90deg)}
details.pcard[open] summary{border-bottom:1px solid var(--line)}
.pbody{padding:14px 16px}
.fecha{font-weight:800; font-size:14px}
.tbadge{font:700 11px 'Inter'; text-transform:uppercase; letter-spacing:.05em; background:var(--verde-suave); color:var(--verde); border-radius:6px; padding:3px 8px}
.tbadge.amistoso{background:var(--azul-suave); color:var(--azul)}
.resline{font-size:13px; font-weight:700; color:var(--muted)}
.resline b{color:var(--verde)}
.badge{display:inline-block; font-size:11.5px; font-weight:700; border-radius:6px; padding:3px 8px; background:var(--panel2); border:1px solid var(--line)}
.badge.mvp{background:var(--amarillo-suave); border-color:#eed9a0; color:#946c00}
.badge.gol{background:var(--verde-suave); border-color:#bcd9c4; color:var(--verde)}
.badge.doma{background:var(--azul-suave); border-color:#bed3e6; color:var(--azul)}
.badge.domado{background:var(--rojo-suave); border-color:#ecc7c0; color:var(--rojo)}
.badge.off{color:var(--muted)}
.equipos{display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:start}
.equipos.tri{grid-template-columns:repeat(3,1fr)}
@media(max-width:640px){.equipos,.equipos.tri{grid-template-columns:1fr}.vs{display:none}}
.vs{font-family:'Anton'; color:var(--line2); font-size:20px; align-self:center}
.eq{background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:10px 12px}
.eq.win{border-color:var(--verde); background:var(--verde-suave)}
.ename{display:flex; justify-content:space-between; font:700 12px 'Inter'; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:7px}
.res-g{color:var(--verde)} .res-e{color:var(--amarillo)} .res-p{color:var(--muted)}
.eq ol{margin:0; padding-left:22px; font-size:14px}
.eq ol li{padding:1.5px 0}
.eq ol li::marker{color:var(--verde); font-weight:800; font-size:12px}
.eq.win ol li::marker{color:var(--verde)}
.desaf{color:var(--muted); font-style:italic}
.pacts{display:flex; gap:8px; padding:0 16px 14px}

/* ---------- forms / modal ---------- */
.field{margin-bottom:13px}
.field label{display:block; font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:5px; font-weight:700}
.field input,.field select,.field textarea{width:100%; background:#fff; border:1px solid var(--line2); border-radius:8px; padding:9px 10px; font:600 14px 'Inter'; color:var(--ink)}
.field input:focus,.field select:focus{outline:2px solid var(--verde2); border-color:var(--verde2)}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:12px}
@media(max-width:560px){.grid2,.grid3{grid-template-columns:1fr}}
.check{display:flex; gap:8px; align-items:center; font-size:14px; font-weight:600; cursor:pointer}
.check input{width:17px; height:17px; accent-color:var(--verde)}
.modalacts{display:flex; gap:10px; justify-content:flex-end; margin-top:18px}
#overlay{display:none; position:fixed; inset:0; background:rgba(30,40,25,.45); z-index:80; padding:20px; overflow:auto}
#overlay.on{display:flex; align-items:flex-start; justify-content:center}
#modal{background:var(--panel); border-radius:14px; padding:22px; width:100%; max-width:720px; margin:2vh 0; box-shadow:0 20px 60px rgba(0,0,0,.3)}
#modal h3{color:var(--verde); font-size:22px; margin-bottom:14px}
.pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px}
.pgrid .field{margin:0}
.pgrid .field.off-flag{opacity:.45}

/* ---------- chips picker ---------- */
.chips{display:flex; flex-wrap:wrap; gap:6px; min-height:34px; background:var(--panel2); border:1px dashed var(--line2); border-radius:8px; padding:6px; margin-bottom:6px}
.chip{background:var(--verde); color:#fff; border-radius:16px; padding:3px 6px 3px 11px; font:700 12.5px 'Inter'; display:flex; align-items:center; gap:6px}
.chip b{cursor:pointer; background:rgba(255,255,255,.25); border-radius:50%; width:16px; height:16px; display:grid; place-items:center; font-size:10px}
.picker{display:flex; flex-wrap:wrap; gap:5px}
.picker button{background:#fff; border:1px solid var(--line2); border-radius:16px; padding:4px 11px; font:600 12.5px 'Inter'; cursor:pointer; color:var(--ink)}
.picker button:hover:not(:disabled){border-color:var(--verde); color:var(--verde)}
.picker button:disabled{opacity:.35; cursor:default}

/* ---------- sorteo ---------- */
.plist{border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:10px 0}
.plist label{display:flex; align-items:center; gap:12px; padding:9px 14px; border-bottom:1px solid var(--line); cursor:pointer; background:#fff; font-weight:600}
.plist label:last-child{border-bottom:0}
.plist label:hover{background:var(--panel2)}
.plist label.on{background:var(--verde-suave)}
.plist input{width:18px; height:18px; accent-color:var(--verde)}
.plist .pmmr{margin-left:auto; color:var(--azul); font-weight:800; font-size:13px}
.contador{font:800 14px 'Inter'; padding:6px 12px; border-radius:8px; background:var(--panel2); border:1px solid var(--line)}
.contador.ok{background:var(--verde-suave); color:var(--verde); border-color:#bcd9c4}
.contador.warn{background:var(--amarillo-suave); color:#946c00; border-color:#eed9a0}
.tout{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; margin-top:12px}
.tout .eq{padding:14px}
.tout h4{font-family:'Anton'; font-size:17px; color:var(--verde); margin-bottom:6px}
.tout .avg{font-size:12.5px; color:var(--muted); margin-top:8px; border-top:1px dashed var(--line); padding-top:6px}

/* ---------- mmr / charts / matriz ---------- */
.delta-pos{color:var(--verde); font-weight:700}
.delta-neg{color:var(--rojo); font-weight:700}
svg.chart{width:100%; height:auto; background:#fff; border:1px solid var(--line); border-radius:10px}
.legend{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0}
.legend .lg{border:1px solid var(--line2); background:#fff; border-radius:16px; padding:4px 11px 4px 9px; font:700 12px 'Inter'; cursor:pointer; color:var(--muted); display:inline-flex; align-items:center; gap:6px; transition:.15s}
.legend .lg:hover{border-color:var(--verde); color:var(--verde)}
.legend .lg.on{color:#fff; border-color:transparent}
.legend .lg .dot{width:9px; height:9px; border-radius:50%; display:inline-block; background:currentColor}
.spark{vertical-align:middle}
.mmr-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:14px; align-items:start}
@media(max-width:760px){.mmr-grid{grid-template-columns:1fr}}
.fechatabla{overflow:auto; border:1px solid var(--line); border-radius:10px; max-height:520px}
.fechatabla table{border-collapse:collapse; font-size:12px; background:#fff}
.fechatabla th{background:#20372a; color:#e8e4d5; padding:5px 8px; font-size:10.5px; white-space:nowrap; position:sticky; top:0; z-index:2}
.fechatabla th.fcol{position:sticky; left:0; z-index:3}
.fechatabla td{border:1px solid var(--line); padding:4px 8px; text-align:center; min-width:56px; white-space:nowrap}
.fechatabla td.fcol{background:#faf9f4; font-weight:700; text-align:left; position:sticky; left:0; color:var(--ink)}
.fechatabla td.np{color:var(--line2)}
.chart-wrap{position:relative}
.chart-tip{position:absolute; pointer-events:none; background:#20372a; color:#e8e4d5; font:600 11.5px 'Inter'; padding:6px 9px; border-radius:8px; opacity:0; transition:.08s; white-space:nowrap; z-index:5; box-shadow:0 6px 16px rgba(0,0,0,.25)}
.chart-tip.on{opacity:1}
.pcard-mini{background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:9px 11px; margin-bottom:7px; font-size:12.5px}
.pcard-mini b{color:var(--verde)}
.matriz{overflow-x:auto; border:1px solid var(--line); border-radius:10px}
.matriz table{border-collapse:collapse; font-size:12px; background:#fff}
.matriz th{background:#20372a; color:#e8e4d5; padding:5px 7px; font-size:10.5px; white-space:nowrap; position:sticky; top:0}
.matriz td{border:1px solid var(--line); padding:4px 7px; text-align:center; min-width:34px}
.matriz td.p{background:var(--verde-suave); color:var(--verde); font-weight:800}
.matriz td.n{background:var(--rojo-suave); color:var(--rojo); font-weight:800}
.matriz td.dot{background:var(--panel2)}
.matriz td.row{background:#20372a; color:#e8e4d5; font-weight:700; text-align:left; position:sticky; left:0}

/* ---------- admin / misc ---------- */
.admin-only{display:none}
body.is-admin .admin-only{display:initial}
body.is-admin .admin-only.rowflex{display:flex}
body.is-admin .admin-only.panel{display:block}
.toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(80px); background:#22301f; color:#fff; border-radius:10px; padding:11px 20px; font:600 14px 'Inter'; box-shadow:0 8px 24px rgba(0,0,0,.25); z-index:100; opacity:0; transition:.25s; max-width:90vw; text-align:center}
.toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
.jrow{display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap}
.jrow b.inactivo{color:var(--muted); text-decoration:line-through}
</style>
</head>

<body>
<header>
  <div class="hrow">
    <div class="copa">
      <h1 class="display">Copa de la Liga <span class="liga" id="hLiga">Matheu</span></h1>
    </div>
    <select id="torneoSel" class="tsel" title="Torneo"></select>
    <button class="btn ghost" id="btnAdmin" title="Modo administrador">🔒 <span id="adminLbl">Admin</span></button>
  </div>
  <div id="adminbar">
    <span>🛠️ Modo admin activo</span>
    <span id="dirty" class="muted">Sin cambios</span>
    <span class="spacer"></span>
    <button class="btn small" id="btnDescargar">⬇ Respaldo</button>
    <button class="btn small primary" id="btnPublicar">💾 Guardar ahora</button>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main id="main"></main>

<div id="overlay"><div id="modal"></div></div>
<div class="toast" id="toast"></div>

};

function puntosDe(tid){ const t=torneo(tid); return (t && t.puntos) ? {...S.config.puntos, ...t.puntos} : S.config.puntos; }
function primeraFechaDe(tid){

function ultimaFechaDe(tid){

/* ---------- eventos ordenados cronológicamente ---------- */
function eventosCrono(){
  const evs=[
    ...S.partidos.map(p=>({...p,_tipo:'partido'})),
    ...S.triangulares.map(t=>({...t,_tipo:'tri'}))
  ];
  evs.sort((a,b)=> (a.fecha||'').localeCompare(b.fecha||'') || (a.id||'').localeCompare(b.id||''));
  return evs;
}

/* ---------- Motor MMR (Elo por equipos) ---------- */
function computeMMR(){
  const K = +S.config.mmr.K || 100, INI = +S.config.mmr.inicial || 1000;
  const GOLK = +S.config.mmr.golK || 2;
  const r = {}, hist = {};
  S.jugadores.forEach(j=>{ r[j.id]=INI; hist[j.id]=[{fecha:null, r:INI, delta:0, label:'Inicial', eventId:null, torneoId:null}]; });
  const get = id => { if(r[id]==null){ r[id]=INI; hist[id]=[{fecha:null,r:INI,delta:0,label:'Inicial',eventId:null,torneoId:null}]; } return r[id]; };
  const exp = (mio, rival) => 1/(1+Math.pow(10,(rival-mio)/400));

  for(const e of eventosCrono()){
    if(e.cuentaMMR===false) continue;
    const tId = e.torneoId ?? null;
    if(e._tipo==='partido'){
      if(!e.e1?.length || !e.e2?.length) continue;
      const a1 = e.e1.reduce((s,x)=>s+get(x),0)/e.e1.length;
      const a2 = e.e2.reduce((s,x)=>s+get(x),0)/e.e2.length;
      const s1 = e.res==='E1'?1: e.res==='E2'?0:0.5;
      const mult = e.goleada ? GOLK : 1;
      const deltas={};
      e.e1.forEach(x=> deltas[x]=mult*K*(s1-exp(get(x),a2)));
      e.e2.forEach(x=> deltas[x]=mult*K*((1-s1)-exp(get(x),a1)));
      const label = `${fFecha(e.fecha)} · ${e.res==='E'?'Empate': e.res==='E1'?'Ganó E1':'Ganó E2'}${e.goleada?' (goleada)':''}`;
      for(const [x,d] of Object.entries(deltas)){ r[x]+=d; hist[x].push({fecha:e.fecha, r:r[x], delta:d, label, eventId:e.id, torneoId:tId}); }
    } else { // triangular: cada equipo vs promedio de los otros dos; S = 1 / 0.5 / 0 (sin multiplicador de goleada: no aplica a triangulares)
      const eqs = e.equipos; if(!eqs || eqs.some(q=>!q.length)) continue;
      const avgs = eqs.map(q=> q.reduce((s,x)=>s+get(x),0)/q.length);
      const Sarr=[0,0,0];
      Sarr[e.posiciones[0]]=1; Sarr[e.posiciones[1]]=0.5; Sarr[e.posiciones[2]]=0;
      const deltas={};
      eqs.forEach((q,i)=>{
        const rival=(avgs[0]+avgs[1]+avgs[2]-avgs[i])/2;
        q.forEach(x=> deltas[x]=K*(Sarr[i]-exp(get(x),rival)));
      });
      for(const [x,d] of Object.entries(deltas)){ r[x]+=d; hist[x].push({fecha:e.fecha, r:r[x], delta:d, label:`${fFecha(e.fecha)} · Triangular`, eventId:e.id, torneoId:tId}); }
    }
  }
  return {ratings:r, hist};
}
/* timeline compartido: eventos de un torneo (o 'ALL') + serie por jugador con líneas planas cuando no jugó */
function mmrTimeline(tid){
  const {hist} = getCache().mmr;
  const events = eventosCrono().filter(e=> e.fecha && e.cuentaMMR!==false && matchTorneo(tid, e.torneoId ?? null));
  const byEvent = {}; // playerId -> Map(eventId -> hist entry)
  const series = (playerId) => {
    const h = hist[playerId] || [];
    if(!byEvent[playerId]){ const map=new Map(); h.forEach(x=>{ if(x.eventId) map.set(x.eventId, x); }); byEvent[playerId]=map; }
    const map = byEvent[playerId];
    let last = h.length ? h[0].r : (+S.config.mmr.inicial || 1000);
    const out = [];
    for(const e of events){
      const hit = map.get(e.id);
      if(hit){ last = hit.r; out.push({eventId:e.id, fecha:e.fecha, r:hit.r, played:true, delta:hit.delta}); }
      else out.push({eventId:e.id, fecha:e.fecha, r:last, played:false});
    }
    return out;
  };
  return { events, series };
}

/* ---------- Motor de estadísticas y puntos por torneo ---------- */
function matchTorneo(tid, evTid){
  if(tid==='ALL') return true;
  if(tid==='AMISTOSO') return evTid==null;
  return evTid===tid;
}
function statsBlank(){ return {pj:0,g:0,e:0,p:0,mvp:0,domador:0,domado:0,gf:0,gc:0,t1:0,t2:0,t3:0,g4:0,sanc:0,triPJ:0}; }
function computeStats(tid){
  const st={};
  const of = id => st[id] || (st[id]=statsBlank());
  for(const m of S.partidos){
    if(!matchTorneo(tid,m.torneoId)) continue;
    const win = m.res==='E1'?m.e1: m.res==='E2'?m.e2:[];
    const lose= m.res==='E1'?m.e2: m.res==='E2'?m.e1:[];
    [...m.e1,...m.e2].forEach(x=>{ of(x).pj++; if(m.res==='E') of(x).e++; });
    win.forEach(x=>{ of(x).g++; if(m.goleada) of(x).gf++; });
    lose.forEach(x=>{ of(x).p++; if(m.goleada) of(x).gc++; });
    if(m.mvpId) of(m.mvpId).mvp++;
    (m.domadores||[]).forEach(x=>of(x).domador++);
    (m.domados||[]).forEach(x=>of(x).domado++);
  }
  for(const t of S.triangulares){
    if(!matchTorneo(tid,t.torneoId)) continue;
    ['t1','t2','t3'].forEach((k,i)=> t.equipos[t.posiciones[i]].forEach(x=>{ of(x)[k]++; of(x).triPJ++; }));
    if(t.mvpId) of(t.mvpId).mvp++;
    (t.gano4||[]).forEach(x=>of(x).g4++);
    (t.domadores||[]).forEach(x=>of(x).domador++);
    (t.domados||[]).forEach(x=>of(x).domado++);
  }
  for(const s of S.sanciones){
    if(!matchTorneo(tid,s.torneoId)) continue;
    of(s.jugadorId).sanc += +s.puntos||0;
  }
  return st;
}
/* timeline de puntos de tabla (no MMR) acumulados evento a evento, para el gráfico "puntos" del torneo */
function pointsTimeline(tid){
  const P = puntosDe(tid);
  const events = eventosCrono().filter(e=> e.fecha && matchTorneo(tid, e.torneoId ?? null));
  const sancs = S.sanciones.filter(s=>matchTorneo(tid, s.torneoId)).slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  let si = 0;
  const st = {};
  const of = id => st[id] || (st[id]=statsBlank());
  const snapshots = [];
  for(const e of events){
    while(si < sancs.length && (sancs[si].fecha||'') <= (e.fecha||'')){ of(sancs[si].jugadorId).sanc += +sancs[si].puntos||0; si++; }
    let participantes;
    if(e._tipo==='partido'){
      participantes = [...(e.e1||[]), ...(e.e2||[])];
      if(e.e1?.length && e.e2?.length){
        const win = e.res==='E1'?e.e1: e.res==='E2'?e.e2:[];
        const lose= e.res==='E1'?e.e2: e.res==='E2'?e.e1:[];
        [...e.e1,...e.e2].forEach(x=>{ of(x).pj++; if(e.res==='E') of(x).e++; });
        win.forEach(x=>{ of(x).g++; if(e.goleada) of(x).gf++; });
        lose.forEach(x=>{ of(x).p++; if(e.goleada) of(x).gc++; });
        if(e.mvpId) of(e.mvpId).mvp++;
        (e.domadores||[]).forEach(x=>of(x).domador++);
        (e.domados||[]).forEach(x=>of(x).domado++);
      }
    } else {
      const eqs = e.equipos||[];
      participantes = eqs.flat();
      if(eqs.length && !eqs.some(q=>!q.length)){
        ['t1','t2','t3'].forEach((k,i)=> eqs[e.posiciones[i]].forEach(x=>{ of(x)[k]++; of(x).triPJ++; }));
        if(e.mvpId) of(e.mvpId).mvp++;
        (e.gano4||[]).forEach(x=>of(x).g4++);
        (e.domadores||[]).forEach(x=>of(x).domador++);
        (e.domados||[]).forEach(x=>of(x).domado++);
      }
    }
    const totales = {}; Object.keys(st).forEach(id=> totales[id]=totalPts(st[id], P));
    snapshots.push({eventId:e.id, fecha:e.fecha, totales, participantes:new Set(participantes)});
  }
  const series = (playerId) => {
    let last = 0; const out=[];
    snapshots.forEach(s=>{
      const jugo = s.participantes.has(playerId);
      if(jugo) last = s.totales[playerId] ?? last;
      out.push({fecha:s.fecha, r:last, played:jugo});
    });
    return out;
  };
  return { events, series };
}
function totalPts(x, Pt){
  const P=Pt||S.config.puntos;
  let t = x.pj*P.pj + x.g*P.g + x.e*P.e + x.p*P.p - x.sanc;
  if(flagOn('mvp'))     t += x.mvp*P.mvp;
  if(flagOn('doma'))    t += x.domador*P.domador + x.domado*P.domado;
  if(flagOn('goleada')) t += x.gf*P.goleadaFavor + x.gc*P.goleadaContra;
  if(flagOn('tri'))     t += x.t1*P.tri1 + x.t2*P.tri2 + x.t3*P.tri3 + x.g4*P.gano4pj;
  return t;
}
function getCache(){
  if(!cache){ cache = { mmr: computeMMR() }; }
  return cache;
}

const TABS = [
  ['tabla','Tabla'], ['partidos','Partidos'], ['tris','Triangulares'],
  ['mmr','MMR'], ['sorteo','Armar equipos'], ['matriz','Matriz'], ['sanciones','Sanciones'],
  ['jugadores','Jugadores'], ['config','Configuración']
];
function renderTabs(){
  const n=$('#tabs'); n.innerHTML='';
  TABS.forEach(([id,lbl])=>{
    if(id==='config' && !isAdmin) return;
    if((id==='mmr' || id==='sorteo') && !isAdmin) return;
    if(id==='tris' && !flagOn('tri')) return;
    const b=el('button',{textContent:lbl,onclick:()=>{tab=id;render()}});
    if(tab===id) b.classList.add('on');
    n.appendChild(b);
  });
}
function renderTorneoSel(){
  const s=$('#torneoSel'); s.innerHTML='';
  [...S.torneos].reverse().forEach(t=> s.appendChild(el('option',{value:t.id,textContent:t.nombre+(t.cerrado?' · 🏁':'')})));
  s.appendChild(el('option',{value:'AMISTOSO',textContent:'Amistosos (solo MMR)'}));
  s.appendChild(el('option',{value:'ALL',textContent:'⚽ Todos los torneos'}));
  if(![...s.options].some(o=>o.value===torneoFiltro)) torneoFiltro = S.torneos.at(-1)?.id || 'ALL';
  s.value=torneoFiltro;
  s.onchange=()=>{ torneoFiltro=s.value; render(); };
}
function render(){
  if(tab==='votacion' || (tab==='tris'&&!flagOn('tri'))) tab='tabla';
  if(!isAdmin && (tab==='mmr' || tab==='sorteo' || tab==='config')) tab='tabla';
  document.body.classList.toggle('is-admin', isAdmin);
  $('#adminbar').classList.toggle('on', isAdmin);
  $('#adminLbl').textContent = isAdmin ? 'Salir de admin' : 'Admin';
  $('#btnAdmin').firstChild.textContent = isAdmin ? '🔓 ' : '🔒 ';
  renderTabs(); renderTorneoSel();
  const m=$('#main'); m.innerHTML='';
  ({tabla:vTabla, partidos:vPartidos, tris:vTris, mmr:vMMR,
    sorteo:vSorteo, matriz:vMatriz, sanciones:vSanciones, jugadores:vJugadores, config:vConfig}[tab])(m);
}

/* ---------- TABLA ---------- */
let ordenColA = null, ordenColB = null;
function corteActual(){
  const t = torneo(torneoFiltro);
  return (t && t.zonaCorte) ? t.zonaCorte : S.config.zonaCorte;
}
function tablaRows(tid){
  tid = tid ?? torneoFiltro;
  const st = computeStats(tid);
  const P = puntosDe(tid);
  const {ratings} = getCache().mmr;
  let rows = Object.entries(st)
    .filter(([id])=> !jugador(id).borrado)
    .map(([id,x])=>({id, nombre:jnom(id), ...x, total:totalPts(x,P), mmr:ratings[id]??S.config.mmr.inicial, ppp: x.pj? totalPts(x,P)/x.pj : 0}));
  jugadoresActivos().forEach(j=>{ if(!st[j.id]) rows.push({id:j.id,nombre:j.nombre,...statsBlank(),total:0,mmr:ratings[j.id]??S.config.mmr.inicial,ppp:0}); });
  return rows;
}
function ordenar(rows, k, base){ rows.sort((a,b)=> ((b[k]??0)-(a[k]??0)) || b.total-a.total || (base? (base[a.id]??1e9)-(base[b.id]??1e9) : 0) || a.nombre.localeCompare(b.nombre)); return rows; }
/* división en zonas: usa las zonas fijadas del torneo si existen; si no, corta la tabla general */
function zonasSplitFor(tid){
  const ordenDef = S.config.ordenTabla || 'mmr';
  const rows = tablaRows(tid);
  const t = torneo(tid);
  let pr, bn, base = {};
  if(t?.zonas && ((t.zonas.primera||[]).length || (t.zonas.b||[]).length)){
    (t.zonas.primera||[]).forEach((id,i)=> base[id]=i);
    (t.zonas.b||[]).forEach((id,i)=> base[id]=1000+i);
    const inA = new Set(t.zonas.primera||[]);
    pr = rows.filter(r=> inA.has(r.id));
    bn = rows.filter(r=> !inA.has(r.id));
  } else {
    const corte = (t && t.zonaCorte) ? t.zonaCorte : S.config.zonaCorte;
    ordenar([...rows], ordenDef).forEach((r,i)=> base[r.id]=i);
    pr = rows.filter(r=> base[r.id]<corte);
    bn = rows.filter(r=> base[r.id]>=corte);
  }
  ordenar(pr, ordenDef, base); ordenar(bn, ordenDef, base);
  return {primera:pr, b:bn, base};
}
function colsTabla(){
  const F = {mvp:flagOn('mvp'), doma:flagOn('doma'), gol:flagOn('goleada'), tri:flagOn('tri'), mmrCol:S.config.mostrarMMR===true};
  const MIN = new Set(['mvp','domador','domado','gf','gc','t1','t2','t3','g4','sanc','ppp']);
  const cols = [
    ['total','Pts'],
    ...(F.mmrCol?[['mmr','MMR']]:[]),
    ['pj','PJ'],['g','G'],['e','E'],['p','P'],
    ...(F.mvp?[['mvp','MVP']]:[]),
    ...(F.doma?[['domador','Doma +'],['domado','Doma −']]:[]),
    ...(F.gol?[['gf','Gol +'],['gc','Gol −']]:[]),
    ...(F.tri?[['t1','Tri 1°'],['t2','Tri 2°'],['t3','Tri 3°'],['g4','4PJ']]:[]),
    ['sanc','Sanc.'],['ppp','Pts/PJ']
  ];
  return {F, cols, MIN};
}
function campeonesMap(){
  const mp = {};
  S.torneos.forEach(t=>{ if(t.campeonId) mp[t.campeonId]=(mp[t.campeonId]||0)+1; });
  return mp;
}
function campeonBadge(playerId){
  if(torneoFiltro==='ALL'){
    const n = campeonesMap()[playerId]||0;
    return n>0 ? ` <span title="Campeón de ${n} torneo${n>1?'s':''}">${'🏆'.repeat(n)}</span>` : '';
  }
  const t = torneo(torneoFiltro);
  return (t && t.campeonId===playerId) ? ` <span title="Campeón de ${esc(t.nombre)}">🏆</span>` : '';
}
let ordenColAll = null;
function tablaUnica(rows){
  const ordenDef = S.config.ordenTabla || 'mmr';
  const orden = ordenColAll || ordenDef;
  const base = {}; rows.forEach((r,i)=>base[r.id]=i);
  const sorted = orden===ordenDef ? rows : ordenar([...rows], orden, base);
  const {F, cols, MIN} = colsTabla();
  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="zona-h"><h2 class="display">Histórico completo</h2></div>`;
  const wrap = el('div',{className:'tablewrap'});
  const td = (k,inner)=>`<td class="${MIN.has(k)?'min':''}">${inner}</td>`;
  let html = `<table class="tabla"><thead><tr><th class="zh">#</th><th class="nombre">Jugador</th>` +
    cols.map(([k,l])=>`<th data-k="${k}" class="${MIN.has(k)?'min ':''}${orden===k?'sorted':''}">${l}</th>`).join('') + `</tr></thead><tbody>`;
  sorted.forEach((r,i)=>{
    html += `<tr class="${i<4?'r-top':''}"><td class="rank">${i+1}</td><td class="nombre">${esc(r.nombre)}${campeonBadge(r.id)}</td>
      <td class="pts">${fmt(r.total)}</td>
      ${F.mmrCol?`<td class="mmr">${fmt(r.mmr,0)}</td>`:''}
      <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
      ${F.mvp?td('mvp',r.mvp||''):''}
      ${F.doma?td('domador',r.domador?`<span class="pos">${r.domador}</span>`:'')+td('domado',r.domado?`<span class="neg">${r.domado}</span>`:''):''}
      ${F.gol?td('gf',r.gf||'')+td('gc',r.gc?`<span class="neg">${r.gc}</span>`:''):''}
      ${F.tri?td('t1',r.t1||'')+td('t2',r.t2||'')+td('t3',r.t3||'')+td('g4',r.g4||''):''}
      ${td('sanc',r.sanc?`<span class="neg">−${fmt(r.sanc)}</span>`:'')}${td('ppp',fmt(r.ppp,2))}</tr>`;
  });
  wrap.innerHTML = html + '</tbody></table>';
  wrap.querySelectorAll('th[data-k]').forEach(th=> th.onclick=()=>{
    ordenColAll = th.dataset.k===orden ? null : th.dataset.k;
    render();
  });
  p.appendChild(wrap);
  if(orden!==ordenDef) p.appendChild(el('div',{className:'hint',style:'margin-top:8px',innerHTML:'Ordenada por otra columna. Tocá de nuevo la columna para volver al orden oficial.'}));
  return p;
}
function bloqueDerechaTabla(tid){
  const box=el('div');
  box.appendChild(el('h3',{className:'display',style:'font-size:16px;color:var(--azul);margin-bottom:8px',textContent:'Puntos totales, partido a partido'}));
  const pt=pointsTimeline(tid);
  if(!pt.events.length){ box.appendChild(el('div',{className:'empty',textContent:'Sin partidos todavía.'})); return box; }
  const idsSet=new Set(); pt.events.forEach(e=>participantesDe(e).forEach(id=>idsSet.add(id)));
  const jugadores=[...idsSet].map(id=>({id,nombre:jnom(id)})).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const colorMapLocal=new Map();
  jugadores.forEach((j,i)=> colorMapLocal.set(j.id, colorGenerado(i)));
  const serie=jugadores.map(j=>({nombre:j.nombre, color:colorMapLocal.get(j.id), pts:pt.series(j.id)}));
  box.appendChild(chartLineas(serie, pt.events, {zeroFloor:true}));
  box.appendChild(leyendaEstatica(jugadores, colorMapLocal));
  return box;
}
function tablaZona(tipo, zrows, base){
  const ordenDef = S.config.ordenTabla || 'mmr';
  const orden = (tipo==='A'? ordenColA : ordenColB) || ordenDef;
  const rankDef = {}; zrows.forEach((r,i)=> rankDef[r.id]=i+1);
  const rows = orden===ordenDef ? zrows : ordenar([...zrows], orden, base);
  const {F, cols, MIN} = colsTabla();
  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="zona-h ${tipo==='A'?'za':'zb'}"><h2 class="display">${tipo==='A'?'Primera A':'Primera B'}</h2></div>`;
  const wrap = el('div',{className:'tablewrap'});
  const td = (k,inner)=>`<td class="${MIN.has(k)?'min':''}">${inner}</td>`;
  let html = `<table class="tabla"><thead><tr><th class="zh">#</th><th class="nombre">Jugador</th>` +
    cols.map(([k,l])=>`<th data-k="${k}" class="${MIN.has(k)?'min ':''}${orden===k?'sorted':''}">${l}</th>`).join('') + `</tr></thead><tbody>`;
  rows.forEach(r=>{
    const dr = rankDef[r.id];
    const tint = tipo==='A' ? (dr<=4?'r-top': dr>zrows.length-4?'r-desc':'') : (dr<=4?'r-asc':'');
    html += `<tr class="${tint}"><td class="rank">${dr}</td><td class="nombre">${esc(r.nombre)}${campeonBadge(r.id)}</td>
      <td class="pts">${fmt(r.total)}</td>
      ${F.mmrCol?`<td class="mmr">${fmt(r.mmr,0)}</td>`:''}
      <td>${r.pj}</td><td>${r.g}</td><td>${r.e}</td><td>${r.p}</td>
      ${F.mvp?td('mvp',r.mvp||''):''}
      ${F.doma?td('domador',r.domador?`<span class="pos">${r.domador}</span>`:'')+td('domado',r.domado?`<span class="neg">${r.domado}</span>`:''):''}
      ${F.gol?td('gf',r.gf||'')+td('gc',r.gc?`<span class="neg">${r.gc}</span>`:''):''}
      ${F.tri?td('t1',r.t1||'')+td('t2',r.t2||'')+td('t3',r.t3||'')+td('g4',r.g4||''):''}
      ${td('sanc',r.sanc?`<span class="neg">−${fmt(r.sanc)}</span>`:'')}${td('ppp',fmt(r.ppp,2))}</tr>`;
  });
  wrap.innerHTML = html + '</tbody></table>';
  wrap.querySelectorAll('th[data-k]').forEach(th=> th.onclick=()=>{
    const nuevo = th.dataset.k===orden ? null : th.dataset.k;
    if(tipo==='A') ordenColA=nuevo; else ordenColB=nuevo;
    render();
  });
  p.appendChild(wrap);
  if(orden!==ordenDef) p.appendChild(el('div',{className:'hint',style:'margin-top:8px',innerHTML:'Ordenada por otra columna: el <b>#</b> sigue mostrando la posición real de esta zona. Tocá de nuevo la columna para volver.'}));
  return p;
}
function vTabla(m){
  const t = torneo(torneoFiltro);
  const esAll = torneoFiltro==='ALL';
  const p = el('div',{className:'panel'});
  const rango = rangoTorneoTxt(t);
  p.innerHTML = `<div class="rowflex"><h2 class="display">Tabla · ${esc(nombreFiltro())}</h2><span class="spacer"></span>
    <button class="btn wsp" id="btnWsp">📋 Copiar para WhatsApp</button></div>
    ${rango?`<div class="trango">${rango}</div>`:''}
    ${esAll?'':'<div class="leyenda"><span class="l-desc">Descienden (últimos 4 de la A)</span><span class="l-asc">Ascienden (primeros 4 de la B)</span></div>'}`;
  if(isAdmin && t){
    const fr = p.querySelector('.rowflex');
    fr.insertBefore(el('button',{className:'btn',textContent:'⚑ Editar zonas A/B',onclick:()=>formZonas(t)}), fr.querySelector('#btnWsp'));
  }
  p.querySelector('#btnWsp').onclick=()=>copiarTablaWsp();
  m.appendChild(p);

  const grid=el('div',{className:'mmr-grid'});
  const leftCol=el('div');
  if(esAll){
    const rows=tablaRows('ALL');
    if(rows.length) leftCol.appendChild(tablaUnica(rows));
    else leftCol.appendChild(el('div',{className:'empty',textContent:'Todavía no hay jugadores en la tabla.'}));
  } else {
    const {primera, b, base} = zonasSplitFor(torneoFiltro);
    if(primera.length) leftCol.appendChild(tablaZona('A', primera, base));
    if(b.length) leftCol.appendChild(tablaZona('B', b, base));
    if(!primera.length && !b.length) leftCol.appendChild(el('div',{className:'empty',textContent:'Todavía no hay jugadores en la tabla.'}));
  }
  grid.appendChild(leftCol);
  grid.appendChild(bloqueDerechaTabla(torneoFiltro));
  m.appendChild(grid);
}
function copiarTablaWsp(){
  const conMMR = S.config.mostrarMMR===true;
  const linea = (r,i,ico) => `${ico} ${i+1}. ${r.nombre} — *${fmt(r.total)} pts*${conMMR?` · MMR ${fmt(r.mmr,0)}`:''} · ${r.pj}PJ\n`;
  let t = `🏆 *${S.config.nombreLiga}* — ${nombreFiltro()}\n`;
  const rango = rangoTorneoTxt(torneo(torneoFiltro)); if(rango) t += `_${rango}_\n`;
  if(torneoFiltro==='ALL'){
    const rows = ordenar(tablaRows('ALL'), S.config.ordenTabla||'mmr');
    t += `\n`;
    rows.forEach((r,i)=> t += linea(r,i, i<4?'⭐':'▪️'));
  } else {
    const {primera, b} = zonasSplitFor(torneoFiltro);
    t += `\n🟢 *PRIMERA A*\n`;
    primera.forEach((r,i)=> t += linea(r,i, i<4?'⭐': i>=primera.length-4?'🔻':'▪️'));
    if(b.length){ t += `\n🔵 *PRIMERA B*\n`; b.forEach((r,i)=> t += linea(r,i, i<4?'🔺':'▪️')); }
  }
  t += `\n_Actualizada ${fFecha(hoy())}_`;
  (navigator.clipboard?.writeText(t)||Promise.reject()).then(()=>toast('Tabla copiada: pegala en WhatsApp'))
    .catch(()=>{ prompt('Copiá el texto:', t); });
}
function nombreFiltro(){
  return torneoFiltro==='ALL'?'Todos los torneos': torneoFiltro==='AMISTOSO'?'Amistosos': (torneo(torneoFiltro)?.nombre||'');
}

/* ---------- PARTIDOS ---------- */
function vPartidos(m){
  const p = el('div',{className:'panel'});
  p.innerHTML = `<div class="rowflex"><h2 class="display">Partidos · ${esc(nombreFiltro())}</h2><span class="spacer"></span></div>
  <div class="hint">Ordenados por torneo (el más reciente primero) y del partido más nuevo al más viejo. Tocá un partido para ver los equipos completos.</div>`;
  if(isAdmin) p.querySelector('.rowflex').appendChild(el('button',{className:'btn primary',textContent:'+ Nuevo partido',onclick:()=>formPartido()}));
  m.appendChild(p);
  const tIdx = tid => tid==null ? -1 : S.torneos.findIndex(t=>t.id===tid);
  const list = S.partidos.filter(x=>matchTorneo(torneoFiltro,x.torneoId))
    .sort((a,b)=> (tIdx(b.torneoId)-tIdx(a.torneoId)) || (b.fecha||'').localeCompare(a.fecha||'') || b.id.localeCompare(a.id));
  if(!list.length){ m.appendChild(el('div',{className:'empty',textContent:'Todavía no hay partidos cargados acá.'})); return; }
  let grupo = '__init';
  list.forEach(pt=>{
    if(torneoFiltro==='ALL' && (pt.torneoId||null)!==grupo){
      grupo = pt.torneoId||null;
      const tt = grupo ? torneo(grupo) : null;
      const h = el('div',{style:'margin:16px 2px 8px'});
      h.innerHTML = `<h3 class="display" style="color:var(--verde);font-size:20px">${tt?esc(tt.nombre):'Amistosos'}</h3>${tt&&rangoTorneoTxt(tt)?`<div class="small muted">${rangoTorneoTxt(tt)}</div>`:''}`;
      m.appendChild(h);
    }
    m.appendChild(cardPartido(pt));
  });
}
function torneoBadge(tid){
  return tid==null ? `<span class="tbadge amistoso">Amistoso · solo MMR</span>`
                   : `<span class="tbadge">${esc(torneo(tid)?.nombre||'?')}</span>`;
}
function cardPartido(pt, nro){
  const c = el('details',{className:'pcard'});
  const resTxt = pt.res==='E' ? 'Empate' : `Ganó <b>Equipo ${pt.res==='E1'?1:2}</b>`;
  const badges = [];
  if(pt.goleada && flagOn('goleada')) badges.push(`<span class="badge gol">Goleada</span>`);
  if(pt.mvpId && flagOn('mvp')) badges.push(`<span class="badge mvp">⭐ MVP: ${jdisp(pt.mvpId)}</span>`);
  if(flagOn('doma')){
    (pt.domadores||[]).forEach(x=>badges.push(`<span class="badge doma">🐎 Domador: ${jdisp(x)}</span>`));
    (pt.domados||[]).forEach(x=>badges.push(`<span class="badge domado">Domado: ${jdisp(x)}</span>`));
  }
  if(pt.cuentaMMR===false) badges.push(`<span class="badge off">No afecta MMR</span>`);
  const eqHtml = (ids, cls, tag) => `<div class="eq ${cls}"><div class="ename"><span>${tag} · ${ids.length} jug.</span>${cls==='win'?'<span class="res-g">GANÓ ✓</span>': pt.res==='E'?'<span class="res-e">EMPATE</span>':''}</div><ol>${ids.map(x=>`<li>${jdisp(x)}</li>`).join('')}</ol></div>`;
  c.innerHTML = `<summary>
      <span class="fecha">${fFecha(pt.fecha)}</span>
      ${torneoBadge(pt.torneoId)}
      <span class="resline">${resTxt} · ${pt.e1.length} vs ${pt.e2.length}</span>
      <span class="caret">▶</span>
    </summary>
    <div class="pbody">
      <div class="rowflex" style="margin-bottom:10px">${badges.join(' ')||'<span class="muted small">Sin destacados</span>'}</div>
      <div class="equipos">${eqHtml(pt.e1, pt.res==='E1'?'win':'', 'Equipo 1')}<div class="vs">VS</div>${eqHtml(pt.e2, pt.res==='E2'?'win':'', 'Equipo 2')}</div>
    </div>`;
  if(isAdmin){
    const acts=el('div',{className:'pacts'});
    acts.appendChild(el('button',{className:'btn small',textContent:'✎ Editar',onclick:()=>formPartido(pt)}));
    acts.appendChild(el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{ if(confirm('¿Eliminar este partido? Se recalculan puntos y MMR.')){ S.partidos=S.partidos.filter(x=>x.id!==pt.id); marcar(); render(); }}}));
    c.appendChild(acts);
  }
  return c;
}

/* ---------- TRIANGULARES ---------- */

  p.innerHTML = `<div class="rowflex"><h2 class="display">Triangulares · ${esc(nombreFiltro())}</h2><span class="spacer"></span></div>
  <div class="hint">Tres equipos, todos contra todos. Puntos por posición final (${PT.tri1} / ${PT.tri2} / ${PT.tri3}) + bonus por ganar 4 partidos.</div>`;
  if(isAdmin) p.querySelector('.rowflex').appendChild(el('button',{className:'btn primary',textContent:'+ Nuevo triangular',onclick:()=>formTri()}));
  m.appendChild(p);
  const list = S.triangulares.filter(x=>matchTorneo(torneoFiltro,x.torneoId)).sort((a,b)=> b.fecha.localeCompare(a.fecha));

    (t.gano4||[]).forEach(x=>badges.push(`<span class="badge gol">🔥 Ganó 4PJ: ${jdisp(x)}</span>`));
    if(flagOn('doma')){
      (t.domadores||[]).forEach(x=>badges.push(`<span class="badge doma">🐎 Domador: ${jdisp(x)}</span>`));

        <div class="rowflex" style="margin-bottom:10px">${badges.join(' ')||'<span class="muted small">Sin destacados</span>'}</div>

           <ol>${t.equipos[eqIdx].map(x=>`<li>${jdisp(x)}</li>`).join('')}</ol></div>`).join('')}</div>
      </div>`;
    if(isAdmin){
      const acts=el('div',{className:'pacts'});
      acts.appendChild(el('button',{className:'btn small',textContent:'✎ Editar',onclick:()=>formTri(t)}));
      acts.appendChild(el('button',{className:'btn small danger',textContent:'Eliminar',onclick:()=>{ if(confirm('¿Eliminar triangular?')){ S.triangulares=S.triangulares.filter(x=>x.id!==t.id); marcar(); render(); }}}));
      c.appendChild(acts);
    }
    m.appendChild(c);
  });
}
</script>

<script>
/* ---------- MMR ---------- */
let mmrSel = null, ptsSel = null;
const mmrColorMap = new Map(), ptsColorMap = new Map();
const CHART_COLORS = ['#f2c13d','#4cb872','#5aa7d6','#e05548','#c48ef2','#f2985a'];
function colorGenerado(i){ return `hsl(${Math.round((i*137.508)%360)},62%,45%)`; }
function asignarColor(colorMap, id){
  if(colorMap.has(id)) return colorMap.get(id);
  const usados = new Set(colorMap.values());
  let libre = CHART_COLORS.find(c=>!usados.has(c));
  if(!libre) libre = colorGenerado(colorMap.size);
  colorMap.set(id, libre);
  return libre;
}
function renderLegend(rows, sel, colorMap){
  const leg=el('div',{className:'legend'});
  if(!rows.length) return leg;
  rows.forEach(r=>{
    const on=sel.has(r.id);
    const b=el('span',{className:'lg'+(on?' on':''),onclick:()=>{ on?sel.delete(r.id):sel.add(r.id); render(); }});
    if(on){ const color=asignarColor(colorMap,r.id); b.style.background=color; b.style.borderColor=color; b.innerHTML='<span class="dot"></span>'; }
    else colorMap.delete(r.id);
    b.appendChild(document.createTextNode(r.nombre));
    leg.appendChild(b);
  });
  return leg;
}
function leyendaEstatica(rows, colorMap){
  const leg=el('div',{className:'legend'});
  rows.forEach(r=>{
    const color=colorMap.get(r.id);
    const b=el('span',{className:'lg on',style:`background:${color};border-color:${color};cursor:default`});
    b.innerHTML='<span class="dot"></span>';
    b.appendChild(document.createTextNode(r.nombre));
    leg.appendChild(b);
  });
  return leg;
}
function participantesDe(e){ return e._tipo==='partido' ? [...(e.e1||[]),...(e.e2||[])] : (e.equipos||[]).flat(); }
function vMMR(m){
  const {ratings,hist}=getCache().mmr;
  const rows = S.jugadores.filter(j=>j.activo!==false).map(j=>({id:j.id,nombre:j.nombre,r:ratings[j.id],h:hist[j.id]})).sort((a,b)=>b.r-a.r);
  const golK = +S.config.mmr.golK || 2;
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Ranking MMR</h2>
  <div class="hint">Elo por equipos: todos arrancan en ${S.config.mmr.inicial} y cada partido mueve el puntaje según el resultado y la diferencia contra el promedio rival (K=${S.config.mmr.K}, goleada ×${fmt(golK,1)}). Se recalcula siempre desde el historial completo. Este número se usa para armar equipos parejos.</div>`;
  let html=`<div class="tablewrap"><table class="tabla mmr-table"><thead><tr><th>#</th><th class="nombre">Jugador</th><th>MMR</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    html+=`<tr><td class="rank">${i+1}</td><td class="nombre">${esc(r.nombre)}</td><td class="mmr">${fmt(r.r,1)}</td></tr>`;
  });
  p.innerHTML+=html+'</tbody></table></div>'; m.appendChild(p);

  // Gráfico Evolución — histórico completo (todos los torneos), eje X con fechas reales
  const p2=el('div',{className:'panel'});
  p2.innerHTML=`<h2 class="display">Evolución</h2><div class="hint">Tocá los nombres para comparar los jugadores que quieras. Tramo punteado = ese jugador no jugó ese partido.</div>`;
  if(!mmrSel) mmrSel = new Set(rows.slice(0,4).map(r=>r.id));
  p2.appendChild(renderLegend(rows, mmrSel, mmrColorMap));
  const tlAll = mmrTimeline('ALL');
  const serieEvol = [...mmrSel].map(id=>({nombre:jnom(id), color:asignarColor(mmrColorMap,id), pts:tlAll.series(id)}));
  p2.appendChild(chartLineas(serieEvol, tlAll.events));
  m.appendChild(p2);

  // Detalle histórico completo: fecha a fecha (MMR) de todos los torneos + lista de todos los partidos
  const p3=el('div',{className:'panel'});
  p3.innerHTML=`<h2 class="display">Historial completo</h2>`;
  const grid=el('div',{className:'mmr-grid'});
  grid.appendChild(bloqueFechaAFecha('ALL'));
  grid.appendChild(bloqueListaPartidos('ALL'));
  p3.appendChild(grid);
  m.appendChild(p3);
}
function bloqueFechaAFecha(tid){
  const box=el('div');
  box.appendChild(el('h3',{className:'display',style:'font-size:16px;color:var(--verde);margin-bottom:8px',textContent:'MMR fecha a fecha'}));
  const tl=mmrTimeline(tid);
  if(!tl.events.length){ box.appendChild(el('div',{className:'empty',textContent:'Sin partidos todavía.'})); return box; }
  const idsSet=new Set(); tl.events.forEach(e=> participantesDe(e).forEach(id=>idsSet.add(id)));
  const jugadores=[...idsSet].map(id=>({id,nombre:jnom(id)})).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const seriePorJ={}; jugadores.forEach(j=> seriePorJ[j.id]=tl.series(j.id));
  let html=`<div class="fechatabla"><table><thead><tr><th class="fcol">Fecha</th>${jugadores.map(j=>`<th title="${esc(j.nombre)}">${esc(j.nombre.slice(0,8))}</th>`).join('')}</tr></thead><tbody>`;
  tl.events.forEach((e,i)=>{
    html+=`<tr><td class="fcol">${fFecha(e.fecha)}</td>`+jugadores.map(j=>{
      const pt=seriePorJ[j.id][i];
      if(!pt.played) return `<td class="np" title="${fmt(pt.r,0)} (no jugó)">—</td>`;
      const d=pt.delta||0;
      return `<td>${fmt(pt.r,0)} <span class="${d>=0?'delta-pos':'delta-neg'}" style="font-size:10.5px">(${d>=0?'+':'−'}${fmt(Math.abs(d),0)})</span></td>`;
    }).join('')+`</tr>`;
  });
  html+='</tbody></table></div>';
  box.appendChild(el('div',{innerHTML:html}).firstChild);
  return box;
}
function bloqueListaPartidos(tid){
  const box=el('div');
  box.appendChild(el('h3',{className:'display',style:'font-size:16px;color:var(--verde);margin-bottom:8px',textContent:'Todos los partidos'}));
  const listWrap=el('div',{style:'max-height:560px;overflow:auto'});
  const partidos=S.partidos.filter(x=>matchTorneo(tid,x.torneoId)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tris=S.triangulares.filter(x=>matchTorneo(tid,x.torneoId)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!partidos.length && !tris.length) listWrap.appendChild(el('div',{className:'empty',textContent:'Sin partidos cargados.'}));
  partidos.forEach(pp=>{
    const resTxt = pp.res==='E'?'Empate':`Ganó Equipo ${pp.res==='E1'?1:2}`;
    listWrap.appendChild(el('div',{className:'pcard-mini',innerHTML:`<b>${fFecha(pp.fecha)}</b> — ${torneoBadge(pp.torneoId)} ${resTxt} · ${pp.e1.length} vs ${pp.e2.length}${pp.goleada?' · 🔥 Goleada':''}`}));
  });
  tris.forEach(tt=>{
    listWrap.appendChild(el('div',{className:'pcard-mini',innerHTML:`<b>${fFecha(tt.fecha)}</b> — ${torneoBadge(tt.torneoId)} Triangular · 🥇 Equipo ${tt.posiciones[0]+1}`}));
  });
  box.appendChild(listWrap);
  return box;
}
function spark(vals){
  if(vals.length<2) return '<span class="muted small">—</span>';
  const w=120,h=30,min=Math.min(...vals),max=Math.max(...vals),rg=(max-min)||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-3-(v-min)/rg*(h-6)).toFixed(1)}`).join(' ');
  const up=vals[vals.length-1]>=vals[0];
  return `<svg width="${w}" height="${h}" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="${up?'var(--verde)':'var(--rojo)'}" stroke-width="1.8"/></svg>`;
}
function chartLineas(series, events, opts={}){
  const wrap=el('div',{className:'chart-wrap'});
  if(!series.length || !events || events.length<2){ wrap.innerHTML='<div class="empty">Elegí jugadores con partidos jugados.</div>'; return wrap; }
  const W=980,H=340,pad={l:56,r:14,t:14,b:34};
  const allVals=series.flatMap(s=>s.pts.map(x=>x.r));
  let lo=Math.min(...allVals), hi=Math.max(...allVals);
  if(opts.zeroFloor) lo=Math.min(lo,0);
  if(lo===hi){ lo-=25; hi+=25; }
  const padVal=Math.max((hi-lo)*0.1, 5);
  const min=Math.floor((lo-padVal)/25)*25, max=Math.ceil((hi+padVal)/25)*25;
  const n=events.length;
  const X=i=> pad.l+(n<2?0:i/(n-1))*(W-pad.l-pad.r);
  const Y=v=> pad.t+(1-(v-min)/((max-min)||1))*(H-pad.t-pad.b);
  let g='';
  for(let v=min; v<=max; v+=Math.max(25,Math.round((max-min)/6/25)*25)){
    g+=`<line x1="${pad.l}" x2="${W-pad.r}" y1="${Y(v)}" y2="${Y(v)}" stroke="rgba(233,242,228,.5)"/><text x="${pad.l-8}" y="${Y(v)+4}" fill="var(--muted)" font-size="11" text-anchor="end">${v}</text>`;
  }
  const step=Math.max(1, Math.ceil(n/7));
  for(let i=0;i<n;i+=step){
    g+=`<text x="${X(i)}" y="${H-10}" fill="var(--muted)" font-size="10" text-anchor="middle">${fFecha(events[i].fecha)}</text>`;
  }
  series.forEach(s=>{
    let i=0;
    while(i<s.pts.length){
      let j=i;
      while(j+1<s.pts.length && s.pts[j+1].played===s.pts[i].played) j++;
      const start=i>0? i-1 : i;
      const seg=s.pts.slice(start,j+1).map((pt,k)=>`${X(start+k)},${Y(pt.r)}`).join(' ');
      const dashed=!s.pts[i].played;
      g+=`<polyline points="${seg}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linejoin="round" ${dashed?'stroke-dasharray="5,4" opacity=".5"':''}/>`;
      i=j+1;
    }
    const li=s.pts.length-1;
    g+=`<circle cx="${X(li)}" cy="${Y(s.pts[li].r)}" r="4.5" fill="${s.color}" stroke="#fff" stroke-width="1.5"/>`;
  });
  wrap.innerHTML=`<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Evolución">${g}<rect x="${pad.l}" y="${pad.t}" width="${W-pad.l-pad.r}" height="${H-pad.t-pad.b}" fill="transparent"/></svg><div class="chart-tip"></div>`;
  const svg=wrap.querySelector('svg'), tip=wrap.querySelector('.chart-tip'), rectEl=wrap.querySelector('rect');
  rectEl.addEventListener('mousemove', ev=>{
    const box=svg.getBoundingClientRect();
    const xSvg=(ev.clientX-box.left)/box.width*W;
    let idx=Math.round((xSvg-pad.l)/(W-pad.l-pad.r)*(n-1));
    idx=Math.max(0, Math.min(n-1, idx));
    const linea=series.map(s=>`<b style="color:${s.color}">${esc(s.nombre)}:</b> ${fmt(s.pts[idx].r,0)}${s.pts[idx].played?'':' (no jugó)'}`).join('<br>');
    tip.innerHTML=`${fFecha(events[idx].fecha)}<br>${linea}`;
    tip.classList.add('on');
    tip.style.left=Math.min(78, Math.max(2, xSvg/W*100))+'%';
    tip.style.top='6px';
  });
  rectEl.addEventListener('mouseleave', ()=> tip.classList.remove('on'));
  return wrap;
}

/* ---------- SORTEO / ARMAR EQUIPOS ---------- */
let anotados = new Set();
let nEquipos = 2;
let tamEquipo = 0;
function vSorteo(m){
  const {ratings}=getCache().mmr;
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Armar equipos por MMR</h2>
  <div class="hint">Tocá a los que están anotados, elegí el formato y la app arma los equipos más parejos posibles según el MMR.</div>`;
  const barra=el('div',{className:'rowflex'});
  const seln=el('select',{style:'max-width:190px'}); [[2,'2 equipos'],[3,'3 equipos (triangular)']].forEach(([v,l])=>seln.appendChild(el('option',{value:v,textContent:l})));
  seln.value=nEquipos;
  const selTam=el('select',{style:'max-width:190px'});
  selTam.appendChild(el('option',{value:'0',textContent:'Tamaño libre'}));
  [4,5,6,7,8,9].forEach(n=>selTam.appendChild(el('option',{value:n,textContent:`${Array(nEquipos).fill(n).join(' vs ')}`})));
  selTam.value=String(tamEquipo);
  const cnt=el('span',{className:'contador'});
  const actualizar=()=>{
    const need = tamEquipo? tamEquipo*nEquipos : null;
    cnt.textContent = need? `${anotados.size} / ${need} anotados` : `${anotados.size} anotados`;
    cnt.className='contador '+(need? (anotados.size===need?'ok':'warn') : (anotados.size>=nEquipos*2?'ok':''));
    selTam.querySelectorAll('option').forEach(o=>{ if(o.value!=='0') o.textContent=Array(nEquipos).fill(o.value).join(' vs '); });
  };
  seln.onchange=()=>{nEquipos=+seln.value; actualizar();};
  selTam.onchange=()=>{tamEquipo=+selTam.value; actualizar();};
  barra.append(seln, selTam, el('span',{className:'spacer'}), cnt);
  p.appendChild(barra);
  const lista=el('div',{className:'plist'});
  jugadoresActivos().forEach(j=>{
    const lb=el('label',{className:anotados.has(j.id)?'on':''});
    const cb=el('input',{type:'checkbox',checked:anotados.has(j.id),onchange:()=>{
      cb.checked?anotados.add(j.id):anotados.delete(j.id); lb.classList.toggle('on',cb.checked); actualizar();
    }});
    lb.append(cb, document.createTextNode(j.nombre), el('span',{className:'pmmr',textContent:fmt(ratings[j.id]??S.config.mmr.inicial,0)}));
    lista.appendChild(lb);
  });
  p.appendChild(lista);
  const fr=el('div',{className:'rowflex'});
  const out=el('div');
  const go=el('button',{className:'btn primary',textContent:'⚖ Armar equipos',onclick:()=>{
    if(anotados.size<nEquipos*2) return toast('Anotá al menos '+(nEquipos*2)+' jugadores');
    if(tamEquipo && anotados.size!==tamEquipo*nEquipos) return toast(`Para ${Array(nEquipos).fill(tamEquipo).join(' vs ')} necesitás ${tamEquipo*nEquipos} anotados (hay ${anotados.size}). Cambiá el formato o usá "Tamaño libre".`);
    dibujarEquipos(out, balancear([...anotados], nEquipos, ratings), ratings);
    out.scrollIntoView({behavior:'smooth',block:'nearest'});
  }});
  const limpiar=el('button',{className:'btn ghost',textContent:'Limpiar',onclick:()=>{anotados.clear(); render();}});
  fr.append(go, limpiar);
  p.appendChild(fr); p.appendChild(out); m.appendChild(p);
  actualizar();
}
function balancear(ids, n, r){
  const rating=id=> r[id] ?? S.config.mmr.inicial;
  const sizes=Array.from({length:n},(_,i)=> Math.floor(ids.length/n)+(i< ids.length%n ?1:0));
  let best=null, bestSpread=Infinity;
  for(let it=0; it<600; it++){
    const arr=[...ids].sort((a,b)=> rating(b)-rating(a) + (Math.random()-.5)*(it?90:0));
    const teams=Array.from({length:n},()=>[]);
    for(const id of arr){
      let bi=-1,bs=Infinity;
      teams.forEach((t,i)=>{ if(t.length<sizes[i]){ const s=t.reduce((a,x)=>a+rating(x),0); if(s<bs){bs=s;bi=i;} } });
      teams[bi].push(id);
    }
    // mejora por swaps
    for(let pass=0; pass<3; pass++){
      for(let i=0;i<n;i++) for(let j=i+1;j<n;j++)
        for(let a=0;a<teams[i].length;a++) for(let b=0;b<teams[j].length;b++){
          const avg=t=>t.reduce((s,x)=>s+rating(x),0)/t.length;
          const cur=Math.abs(avg(teams[i])-avg(teams[j]));
          [teams[i][a],teams[j][b]]=[teams[j][b],teams[i][a]];
          if(Math.abs(avg(teams[i])-avg(teams[j]))>=cur) [teams[i][a],teams[j][b]]=[teams[j][b],teams[i][a]];
        }
    }
    const avgs=teams.map(t=>t.reduce((s,x)=>s+rating(x),0)/t.length);
    const spread=Math.max(...avgs)-Math.min(...avgs);
    if(spread<bestSpread){ bestSpread=spread; best=teams.map(t=>[...t]); }
  }
  return best;
}
function dibujarEquipos(out, teams, r){
  const rating=id=> r[id] ?? S.config.mmr.inicial;
  out.innerHTML='';
  const grid=el('div',{className:'tout'});
  let txt='⚽ *Equipos armados por MMR*\n';
  teams.forEach((t,i)=>{
    t.sort((a,b)=>rating(b)-rating(a));
    const tot=t.reduce((s,x)=>s+rating(x),0);
    const d=el('div',{className:'eq'});
    d.innerHTML=`<h4>Equipo ${i+1} <span class="muted small">· ${t.length} jug.</span></h4>
      <ol style="padding-left:22px">${t.map(x=>`<li>${esc(jnom(x))} <span class="pmmr" style="float:right">${fmt(rating(x),0)}</span></li>`).join('')}</ol>
      <div class="avg">Promedio MMR: <b>${fmt(tot/t.length,1)}</b></div>`;
    grid.appendChild(d);
    txt+=`\n*Equipo ${i+1}*:\n`+t.map((x,k)=>`${k+1}. ${jnom(x)}`).join('\n')+'\n';
  });
  out.appendChild(grid);
  const avgs=teams.map(t=>t.reduce((s,x)=>s+rating(x),0)/t.length);
  const bar=el('div',{className:'rowflex',style:'margin-top:10px'});
  bar.appendChild(el('span',{className:'muted small',textContent:`Diferencia de promedios: ${fmt(Math.max(...avgs)-Math.min(...avgs),1)} MMR`}));
  bar.appendChild(el('span',{className:'spacer'}));
  bar.appendChild(el('button',{className:'btn small wsp',textContent:'📋 Copiar para WhatsApp',onclick:async()=>{ try{ await navigator.clipboard.writeText(txt); toast('Copiado: pegalo en el grupo'); }catch(e){ prompt('Copiá el texto:',txt); } }}));
  out.appendChild(bar);
}

/* ---------- MATRIZ ---------- */
function vMatriz(m){
  const p=el('div',{className:'panel'});
  p.innerHTML=`<h2 class="display">Matriz de rivalidades · ${esc(nombreFiltro())}</h2>
  <div class="hint">Cada celda: (veces que la fila le ganó a la columna) − (veces que perdió contra ella), jugando en equipos rivales. Verde = lo domina, rojo = lo sufre.</div>`;
  const ids = jugadoresActivos().map(j=>j.id);
  const M={}; ids.forEach(a=>{M[a]={}; ids.forEach(b=>M[a][b]=0);});
  for(const pt of S.partidos){
    if(!matchTorneo(torneoFiltro,pt.torneoId) || pt.res==='E') continue;
    const win=pt.res==='E1'?pt.e1:pt.e2, lose=pt.res==='E1'?pt.e2:pt.e1;
    win.forEach(w=>lose.forEach(l=>{ if(M[w]&&M[w][l]!=null){M[w][l]++; M[l][w]--;} }));
  }
  const jugados = ids.filter(a=> ids.some(b=>M[a][b]!==0));
  const cols = jugados.length? jugados : ids;
  let html='<div class="matriz"><table><tr><th class="row"></th>'+cols.map(c=>`<th title="${esc(jnom(c))}">${esc(jnom(c).slice(0,6))}</th>`).join('')+'</tr>';
  cols.forEach(a=>{
    html+=`<tr><th class="row">${esc(jnom(a))}</th>`+cols.map(b=>{
      if(a===b) return '<td style="background:rgba(233,242,228,.06)"></td>';
      const v=M[a][b];
      return `<td class="${v>0?'p':v<0?'n':''}">${v||''}</td>`;
    }).join('')+'</tr>';
  });
  p.innerHTML+=html+'</table></div>'; m.appendChild(p);
}
</script>

<script>
/* ---------- SANCIONES ---------- */
function vSanciones(m){
  const p=el('div',{className:'panel'});
  p.innerHTML=`<div class="rowflex"><h2 class="display">Sanciones · ${esc(nombreFiltro())}</h2><span class="spacer"></span></div>
  <div class="hint">Las sanciones restan puntos directamente del total (llegar tarde, faltar sin avisar, lo que el reglamento del grupo diga).</div>`;
  if(isAdmin) p.querySelector('.rowflex').appendChild(el('button',{className:'btn primary',textContent:'+ Nueva sanción',onclick:()=>formSancion()}));
  const list=S.sanciones.filter(s=>matchTorneo(torneoFiltro,s.torneoId)).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!list.length){ p.appendChild(el('div',{className:'empty',textContent:'Sin sanciones. Qué grupo educado.'})); m.appendChild(p); return; }
  let html=`<div class="tablewrap"><table class="tabla"><thead><tr><th>Fecha</th><th class="nombre">Jugador</th><th>Puntos</th><th class="nombre">Motivo</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>`;
  list.forEach(s=>{
    html+=`<tr><td>${fFecha(s.fecha)}</td><td class="nombre">${esc(jnom(s.jugadorId))}</td><td><span class="neg">−${fmt(s.puntos)}</span></td><td class="nombre muted">${esc(s.motivo||'')}</td>${isAdmin?`<td><button class="btn small danger" data-del="${s.id}">✕</button></td>`:''}</tr>`;
  });
  const wrap=el('div',{innerHTML:html+'</tbody></table></div>'});
  wrap.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>{ S.sanciones=S.sanciones.filter(x=>x.id!==b.dataset.del); marcar(); render(); });
  p.appendChild(wrap.firstChild); m.appendChild(p);
}
function formSancion(){
  const jsel = jugadoresActivos().map(j=>`<option value="${j.id}">${esc(j.nombre)}</option>`).join('');
  const tsel = S.torneos.map(t=>`<option value="${t.id}">${esc(t.nombre)}</option>`).join('');
  openModal(`<h3 class="display">Nueva sanción</h3>
    <div class="grid2">
      <div class="field"><label>Fecha</label><input type="date" id="fFecha" value="${hoy()}"></div>
      <div class="field"><label>Torneo</label><select id="fTorneo">${tsel}</select></div>
      <div class="field"><label>Jugador</label><select id="fJug">${jsel}</select></div>

  $('#fOk').onclick=()=>{

/* ---------- JUGADORES ---------- */
function vJugadores(m){
  const apariciones = id => S.partidos.some(x=>x.e1.includes(id)||x.e2.includes(id))
    || S.triangulares.some(x=>x.equipos.flat().includes(id)) || S.sanciones.some(x=>x.jugadorId===id);
  const p=el('div',{className:'panel'});
  p.innerHTML=`<div class="rowflex"><h2 class="display">Jugadores</h2><span class="spacer"></span></div>
  <div class="hint"><b>Inactivo</b>: no aparece en la tabla ni en el armado de equipos, pero conserva su historial y puede volver — figura en la lista de "Inactivos" más abajo.
  <b>Eliminar</b>: si jugó partidos, queda como <i>desafiliado</i> (figura en los partidos viejos pero desaparece de la tabla); si nunca jugó, se borra del todo.</div>`;
  if(isAdmin){
    const fr=el('div',{className:'rowflex',style:'margin-bottom:12px'});
    const inp=el('input',{type:'text',placeholder:'Nombre del nuevo jugador',style:'max-width:260px;border:1px solid var(--line2);border-radius:8px;padding:8px 10px;font:600 14px Inter'});
    fr.append(inp, el('button',{className:'btn primary',textContent:'+ Agregar',onclick:()=>{
      const n=inp.value.trim(); if(!n) return;
      if(S.jugadores.some(j=>!j.borrado && j.nombre.toLowerCase()===n.toLowerCase())) return toast('Ya existe ese nombre');
      S.jugadores.push({id:uid('j'),nombre:n,activo:true}); marcar(); render(); toast('Jugador agregado');
    }}));
    p.querySelector('.rowflex').after(fr);
  }
  const bind = (root) => {
    root.querySelectorAll('[data-tog]').forEach(b=>b.onclick=()=>{ const j=jugador(b.dataset.tog); j.activo=!(j.activo!==false); marcar(); render(); });
    root.querySelectorAll('[data-ren]').forEach(b=>b.onclick=()=>{ const j=jugador(b.dataset.ren); const n=prompt('Nuevo nombre para '+j.nombre, j.nombre); if(n&&n.trim()){ j.nombre=n.trim(); marcar(); render(); } });
    root.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
      const j=jugador(b.dataset.del);
      if(apariciones(j.id)){
        if(!confirm(`${j.nombre} tiene historial: quedará como "desafiliado" en los partidos viejos y desaparecerá de la tabla y del armado de equipos. ¿Continuar?`)) return;
        j.borrado=true; j.activo=false; toast(j.nombre+' pasó a desafiliado');
      } else {
        if(!confirm(`${j.nombre} nunca jugó: se borra definitivamente. ¿Continuar?`)) return;
        S.jugadores=S.jugadores.filter(x=>x.id!==j.id); toast('Jugador eliminado');
      }
      marcar(); render();
    });
  };

  const activos=S.jugadores.filter(j=>!j.borrado && j.activo!==false).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  let html=`<div class="tablewrap"><table class="tabla"><thead><tr><th class="nombre">Jugador</th>${isAdmin?'<th>Acciones</th>':''}</tr></thead><tbody>`;
  activos.forEach(j=>{
    html+=`<tr><td class="nombre">${esc(j.nombre)}</td>
    ${isAdmin?`<td><button class="btn small" data-ren="${j.id}">✎ Renombrar</button> <button class="btn small ghost" data-tog="${j.id}">Desactivar</button> <button class="btn small danger" data-del="${j.id}">Eliminar</button></td>`:''}</tr>`;
  });
  const wrap=el('div',{innerHTML:html+'</tbody></table></div>'});
  bind(wrap);
  p.appendChild(wrap.firstChild); m.appendChild(p);

  const inactivos=S.jugadores.filter(j=>!j.borrado && j.activo===false).sort((a,b)=>a.nombre.localeCompare(b.nombre));
  if(inactivos.length){
    const p2=el('div',{className:'panel'});
    p2.innerHTML=`<h2 class="display" style="font-size:17px;color:var(--muted)">Inactivos</h2>`;
    let html2=`<div class="tablewrap"><table class="tabla"><thead><tr><th class="nombre">Jugador</th>${isAdmin?'<th>Acciones</th>':''}</tr></thead><tbody>`;
    inactivos.forEach(j=>{
      html2+=`<tr><td class="nombre"><span class="muted">${esc(j.nombre)}</span></td>
      ${isAdmin?`<td><button class="btn small" data-ren="${j.id}">✎ Renombrar</button> <button class="btn small" data-tog="${j.id}">Activar</button> <button class="btn small danger" data-del="${j.id}">Eliminar</button></td>`:''}</tr>`;
    });
    const wrap2=el('div',{innerHTML:html2+'</tbody></table></div>'});
    bind(wrap2);
    p2.appendChild(wrap2.firstChild); m.appendChild(p2);
  }

  const borrados=S.jugadores.filter(j=>j.borrado);
  if(borrados.length && isAdmin){
    const p3=el('div',{className:'panel'});
    p3.innerHTML=`<h2 class="display" style="font-size:17px;color:var(--muted)">Desafiliados</h2>`;
    borrados.forEach(j=>{
      const r=el('div',{className:'jrow'});
      r.append(el('span',{className:'desaf',textContent:j.nombre}), el('span',{className:'spacer'}),
        el('button',{className:'btn small',textContent:'↩ Restaurar',onclick:()=>{ delete j.borrado; j.activo=true; marcar(); render(); toast(j.nombre+' restaurado'); }}));
      p3.appendChild(r);
    });
    m.appendChild(p3);
  }
}

/* ---------- SELECTOR DE EQUIPO (chips) ---------- */
function teamPicker(container, titulo, seleccion, otros){
  const box=el('div',{className:'field'});
  box.appendChild(el('label',{textContent:titulo}));
  const chips=el('div',{className:'chips'});
  const picker=el('div',{className:'picker'});
  const draw=()=>{
    chips.innerHTML='';
    seleccion.forEach(id=>{
      const c=el('span',{className:'chip'}); c.append(document.createTextNode(jnom(id)));
      const x=el('b',{textContent:'✕',onclick:()=>{ seleccion.splice(seleccion.indexOf(id),1); draw(); }});
      c.appendChild(x); chips.appendChild(c);
    });
    if(!seleccion.length) chips.appendChild(el('span',{className:'muted small',textContent:'Tocá abajo para agregar jugadores'}));
    picker.innerHTML='';
    jugadoresActivos().forEach(j=>{
      const usado = seleccion.includes(j.id) || otros().includes(j.id);
      picker.appendChild(el('button',{type:'button',textContent:j.nombre,disabled:usado,onclick:()=>{ seleccion.push(j.id); draw(); }}));
    });
    if(box._onchange) box._onchange();
  };
  box.append(chips,picker); box._redraw=draw; draw();
  container.appendChild(box);
  return box;
}
function multiSel(id, opciones, valores){
  return `<select id="${id}" multiple size="4" style="width:100%">${opciones.map(o=>`<option value="${o.id}" ${valores.includes(o.id)?'selected':''}>${esc(o.nombre)}</option>`).join('')}</select>`;
}
function selVals(id){ return [...$('#'+id).selectedOptions].map(o=>o.value); }
</script>

<script>
/* ---------- FORM PARTIDO ---------- */
function formPartido(pt){
  const editando=!!pt;
  const e1=[...(pt?.e1||[])], e2=[...(pt?.e2||[])];
  const defTid = pt ? pt.torneoId : (torneo(torneoFiltro)?.id ?? null);
  const tsel = S.torneos.map(t=>`<option value="${t.id}" ${defTid===t.id?'selected':''}>${esc(t.nombre)}</option>`).join('')
    + `<option value="" ${defTid==null?'selected':''}>Amistoso (solo MMR, sin puntos)</option>`;
  openModal(`<h3 class="display">${editando?'Editar':'Nuevo'} partido</h3>
    <div class="grid2">
      <div class="field"><label>Fecha</label><input type="date" id="fFecha" value="${pt?.fecha||hoy()}"></div>
      <div class="field"><label>Torneo</label><select id="fTorneo">${tsel}</select></div>
    </div>
    <div id="teams"></div>
    <div class="grid3">
      <div class="field"><label>Resultado</label><select id="fRes">
        <option value="E1" ${pt?.res==='E1'?'selected':''}>Ganó Equipo 1</option>
        <option value="E2" ${pt?.res==='E2'?'selected':''}>Ganó Equipo 2</option>
        <option value="E" ${pt?.res==='E'?'selected':''}>Empate</option></select></div>
      <div class="field" ${flagOn('goleada')?'':'style="display:none"'}><label>&nbsp;</label><label class="check"><input type="checkbox" id="fGol" ${pt?.goleada?'checked':''}> Goleada (+5 goles)</label></div>
      <div class="field"><label>&nbsp;</label><label class="check"><input type="checkbox" id="fMMR" ${pt?.cuentaMMR===false?'':'checked'}> Cuenta para MMR</label></div>
    </div>
    <div class="grid3">
      <div class="field" ${flagOn('mvp')?'':'style="display:none"'}><label>MVP</label><select id="fMvp"></select></div>
      <div class="field" ${flagOn('doma')?'':'style="display:none"'}><label>Domadores (ctrl/⌘ para varios)</label><div id="fDomWrap"></div></div>
      <div class="field" ${flagOn('doma')?'':'style="display:none"'}><label>Domados</label><div id="fDodWrap"></div></div>
    </div>
    <div class="modalacts"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="fOk">${editando?'Guardar cambios':'Cargar partido'}</button></div>`);
  const tdiv=$('#teams');
  const b1=teamPicker(tdiv,'Equipo 1',e1,()=>e2);
  const b2=teamPicker(tdiv,'Equipo 2',e2,()=>e1);
  let refreshing=false;
  const refreshParticipantes=()=>{
    if(refreshing) return; refreshing=true;
    [b1,b2].forEach(b=>b._redraw());
    refreshing=false;
    const parts=[...e1,...e2].map(id=>({id,nombre:jnom(id)}));
    $('#fMvp').innerHTML='<option value="">— Sin MVP / se vota después —</option>'+parts.map(o=>`<option value="${o.id}" ${pt?.mvpId===o.id?'selected':''}>${esc(o.nombre)}</option>`).join('');
    $('#fDomWrap').innerHTML=multiSel('fDom',parts,pt?.domadores||[]);
    $('#fDodWrap').innerHTML=multiSel('fDod',parts,pt?.domados||[]);
  };
  b1._onchange=refreshParticipantes; b2._onchange=refreshParticipantes; refreshParticipantes();
  $('#fOk').onclick=()=>{
    if(e1.length<1||e2.length<1) return toast('Cargá jugadores en los dos equipos');
    const obj={
      id: pt?.id||uid('p'), fecha:$('#fFecha').value||hoy(),
      torneoId: $('#fTorneo').value||null,
      e1:[...e1], e2:[...e2], res:$('#fRes').value, goleada:$('#fGol').checked,
      mvpId: $('#fMvp').value||null, domadores:selVals('fDom'), domados:selVals('fDod'),
      cuentaMMR: $('#fMMR').checked, votos: pt?.votos||{}, votacionAbierta: pt?.votacionAbierta||false
    };
    if(editando) S.partidos[S.partidos.findIndex(x=>x.id===pt.id)]=obj; else S.partidos.push(obj);
    marcar(); closeModal(); render(); toast(editando?'Partido actualizado':'Partido cargado — tabla y MMR recalculados');
  };
}

/* ---------- FORM TRIANGULAR ---------- */
function formTri(t){
  const editando=!!t;
  const eqs=[[...(t?.equipos?.[0]||[])],[...(t?.equipos?.[1]||[])],[...(t?.equipos?.[2]||[])]];
  const defTid = t ? t.torneoId : (torneo(torneoFiltro)?.id ?? S.torneos.at(-1)?.id);
  const tsel=S.torneos.map(x=>`<option value="${x.id}" ${defTid===x.id?'selected':''}>${esc(x.nombre)}</option>`).join('');
  const posSel=(id,val)=>`<select id="${id}">${[0,1,2].map(i=>`<option value="${i}" ${val===i?'selected':''}>Equipo ${i+1}</option>`).join('')}</select>`;
  openModal(`<h3 class="display">${editando?'Editar':'Nuevo'} triangular</h3>
    <div class="grid2">
      <div class="field"><label>Fecha</label><input type="date" id="fFecha" value="${t?.fecha||hoy()}"></div>
      <div class="field"><label>Torneo</label><select id="fTorneo">${tsel}</select></div>
    </div>
    <div id="teams"></div>
    <div class="grid3">
      <div class="field"><label>🥇 1° puesto</label>${posSel('fP1',t?.posiciones?.[0]??0)}</div>
      <div class="field"><label>🥈 2° puesto</label>${posSel('fP2',t?.posiciones?.[1]??1)}</div>
      <div class="field"><label>🥉 3° puesto</label>${posSel('fP3',t?.posiciones?.[2]??2)}</div>
    </div>
    <div class="grid2">
      <div class="field" ${flagOn('mvp')?'':'style="display:none"'}><label>MVP</label><select id="fMvp"></select></div>
      <div class="field"><label>Ganó 4 partidos (bonus)</label><div id="fG4Wrap"></div></div>
      <div class="field" ${flagOn('doma')?'':'style="display:none"'}><label>Domadores (duelo)</label><div id="fDomWrap"></div></div>
      <div class="field" ${flagOn('doma')?'':'style="display:none"'}><label>Domados (duelo)</label><div id="fDodWrap"></div></div>
    </div>
    <label class="check" style="margin-bottom:6px"><input type="checkbox" id="fMMR" ${t?.cuentaMMR?'checked':(editando?'':'checked')}> Cuenta para MMR</label>
    <div class="modalacts"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" id="fOk">${editando?'Guardar cambios':'Cargar triangular'}</button></div>`);
  const tdiv=$('#teams');
  const boxes=eqs.map((eq,i)=> teamPicker(tdiv,`Equipo ${i+1}`,eq,()=> eqs.flatMap((q,j)=> j===i?[]:q)));
  let refreshing=false;
  const refresh=()=>{
    if(refreshing) return; refreshing=true;
    boxes.forEach(b=>b._redraw());
    refreshing=false;
    const parts=eqs.flat().map(id=>({id,nombre:jnom(id)}));
    $('#fMvp').innerHTML='<option value="">— Sin MVP —</option>'+parts.map(o=>`<option value="${o.id}" ${t?.mvpId===o.id?'selected':''}>${esc(o.nombre)}</option>`).join('');
    $('#fG4Wrap').innerHTML=multiSel('fG4',parts,t?.gano4||[]);
    $('#fDomWrap').innerHTML=multiSel('fDom',parts,t?.domadores||[]);
    $('#fDodWrap').innerHTML=multiSel('fDod',parts,t?.domados||[]);
  };
  boxes.forEach(b=>b._onchange=refresh); refresh();
  $('#fOk').onclick=()=>{
    if(eqs.some(q=>q.length<1)) return toast('Cargá jugadores en los tres equipos');
    const pos=[+$('#fP1').value,+$('#fP2').value,+$('#fP3').value];
    if(new Set(pos).size!==3) return toast('Las posiciones tienen que ser tres equipos distintos');
    const obj={ id:t?.id||uid('tr'), fecha:$('#fFecha').value||hoy(), torneoId:$('#fTorneo').value,
      equipos:eqs.map(q=>[...q]), posiciones:pos, gano4:selVals('fG4'), mvpId:$('#fMvp').value||null,
      domadores:selVals('fDom'), domados:selVals('fDod'), cuentaMMR:$('#fMMR').checked,
      votos:t?.votos||{}, votacionAbierta:t?.votacionAbierta||false };
    if(editando) S.triangulares[S.triangulares.findIndex(x=>x.id===t.id)]=obj; else S.triangulares.push(obj);
    marcar(); closeModal(); render(); toast('Triangular guardado');
  };
}

/* ---------- MODAL ---------- */
function openModal(html){ $('#modal').innerHTML=html; $('#overlay').classList.add('on'); }
function closeModal(){ $('#overlay').classList.remove('on'); }
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
</script>

<script>

function vConfig(m){

    <div class="hint">Apagá lo que tu liga no usa: desaparece de la tabla, de los partidos y deja de sumar puntos (sin borrar datos: si lo volvés a prender, todo reaparece).</div>
